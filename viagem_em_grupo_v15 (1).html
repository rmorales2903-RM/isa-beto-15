        function renderPonto(){
      const card = baseSection('Ponto de Encontro', 'Cada pessoa pode compartilhar uma localização temporária para o grupo.');
      card.id = 'form-ponto';
      const btns = el('div','btn-row');
      const btnShare = el('button','btn','Compartilhar minha localização');
      const btnRefresh = el('button','btn secondary small','↻ Atualizar');
      btnRefresh.title = 'Buscar localizações agora';
      btnRefresh.onclick = async ()=>{ btnRefresh.textContent='Atualizando…'; await refreshPontoOnly(); btnRefresh.textContent='↻ Atualizar'; };
      btnShare.onclick = async ()=>{
        if(!state.currentFamily) return showToast('Selecione sua família antes.');
        const member = state.currentMember || membersByFamily(state.currentFamily.id)[0];
        if(!member) return showToast('Cadastre e identifique ao menos um membro da sua família primeiro.');
        if(!navigator.geolocation) return showToast('Geolocalização não suportada.');
        navigator.geolocation.getCurrentPosition(async pos=>{
          const payload = {
            trip_id: state.currentTrip.id,
            member_id: member.id,
            lat: pos.coords.latitude,
            lng: pos.coords.longitude,
            pin_temporario: Math.random().toString(36).slice(2,8).toUpperCase(),
            expira_em: new Date(Date.now()+4*60*60*1000).toISOString()
          };
          const existing = state.cache.checkins.find(c=>c.member_id===member.id);
          let res;
          if(existing) res = await state.supabase.from('checkins_localizacao').update(payload).eq('id', existing.id);
          else res = await state.supabase.from('checkins_localizacao').insert(payload);
          if(res.error) return showToast(res.error.message);
          await refreshPontoOnly();
        }, ()=>showToast('Não foi possível obter a localização.'));
      };
      btns.append(btnShare, btnRefresh);
      card.append(info, btns, el('div','divider'));

      const counterEl = el('div','fine', '');
      counterEl.id = 'ponto-counter';
      card.append(counterEl);

      const list = el('div','list');
      list.id = 'ponto-list';
      const renderList = ()=>{
        list.innerHTML = '';
        if(!state.cache.checkins.length){ list.innerHTML = '<div class="empty">Ninguém compartilhou localização ainda.</div>'; return; }
        state.cache.checkins.forEach(c=>{
          const member = state.cache.members.find(m=>m.id===c.member_id);
          const mapLink = `https://www.google.com/maps?q=${c.lat},${c.lng}`;
          const item = el('div','item');
          item.innerHTML = `<div class="item-head"><div><b>${escapeHtml(member?.name || 'Participante')}</b><div class="fine">Atualizado ${formatDate(c.updated_at || c.created_at)} • Expira ${formatDate(c.expira_em)}</div></div><a class="btn secondary small" href="${mapLink}" target="_blank">Ver no mapa</a></div>`;
          list.appendChild(item);
        });
      };
      renderList();
      card.append(list);
      mount(card);

      // auto-refresh a cada 15s enquanto a aba estiver aberta
      stopPontoPoller();
      let countdown = 15;
      const updateCounter = ()=>{ const el = document.getElementById('ponto-counter'); if(el) el.textContent = `Atualiza automaticamente em ${countdown}s`; };
      updateCounter();
      state.pontoPoller = setInterval(async ()=>{
        countdown--;
        updateCounter();
        if(countdown <= 0){
          countdown = 15;
          await refreshPontoOnly();
          updateCounter();
        }
      }, 1000);
    }

    async function uploadFile(bucket, file, path, publicBucket=false){
      if(!state.supabase) return null;
      const {error} = await state.supabase.storage.from(bucket).upload(path, file, {upsert:true});
      if(error){ showToast(error.message); return null; }
      const obj = state.supabase.storage.from(bucket).getPublicUrl(path);
      if(publicBucket) return obj.data.publicUrl;
      const signed = await state.supabase.storage.from(bucket).createSignedUrl(path, 60*60*24*30);
      if(signed.error){ showToast(signed.error.message); return null; }
      return signed.data.signedUrl;
    }

    function wizardDoneKey(){
      if(!state.currentTrip) return null;
      return `vg_wizard_${state.currentTrip.id}`;
    }

    function wizardAlreadyDone(){
      const k = wizardDoneKey();
      return k ? !!localStorage.getItem(k) : false;
    }

    function markWizardDone(){
      const k = wizardDoneKey();
      if(k) localStorage.setItem(k, '1');
    }

    function openWizard(forceStep){
      const overlay = document.getElementById('wizardOverlay');
      overlay.classList.remove('hidden');
      renderWizardStep(forceStep || 1);
    }

    function closeWizard(){
      document.getElementById('wizardOverlay').classList.add('hidden');
    }

    function renderWizardStep(step){
      const card = document.getElementById('wizardCard');

      const dots = [1,2,3].map(i=>`<div class="wizard-step-dot ${i < step ? 'done' : i === step ? 'active' : ''}"></div>`).join('');
      const progress = `<div class="wizard-steps">${dots}</div>`;

      if(step === 1) renderWizardStep1(card, progress);
      else if(step === 2) renderWizardStep2(card, progress);
      else if(step === 3) renderWizardStep3(card, progress);
    }

    // ─── Passo 1: Qual é a sua família? ────────────────────────────────────────
    function renderWizardStep1(card, progress){
      const families = state.cache.families;
      let selectedFamilyId = state.currentFamily?.id || '';

      const familyItems = families.map(f=>`
        <button class="wizard-family-btn ${selectedFamilyId===f.id?'selected':''}" data-id="${f.id}">

      card.innerHTML = `

          </div>
          <div class="btn-row" style="margin-top:10px">
            <button class="btn small" id="wBtnCreateFamily">Criar família</button>
          </div>
        </div>
        ${families.length && selectedFamilyId ? `
        <div class="wizard-pin-row">
          <div class="field"><label>PIN da família</label><input id="wPinInput" type="password" placeholder="••••"></div>
          <button class="btn" id="wBtnConfirmFamily">Continuar →</button>
        </div>` : (families.length ? `<div id="wPinBlock" class="hidden">
          <div class="wizard-pin-row">
            <div class="field"><label>PIN da família</label><input id="wPinInput" type="password" placeholder="••••"></div>
            <button class="btn" id="wBtnConfirmFamily">Continuar →</button>
          </div>
        </div>` : '')}
      `;

      // Selecionar família ao clicar
      card.querySelectorAll('.wizard-family-btn').forEach(btn=>{
        btn.onclick = ()=>{
          selectedFamilyId = btn.dataset.id;
          card.querySelectorAll('.wizard-family-btn').forEach(b=>b.classList.remove('selected'));
          btn.classList.add('selected');
          // Mostrar PIN
          let pinBlock = card.querySelector('#wPinBlock');
          if(!pinBlock){
            pinBlock = document.createElement('div');
            pinBlock.id = 'wPinBlock';
            pinBlock.innerHTML = `<div class="wizard-pin-row">
              <div class="field"><label>PIN da família</label><input id="wPinInput" type="password" placeholder="••••"></div>
              <button class="btn" id="wBtnConfirmFamily">Continuar →</button>
            </div>`;
            card.appendChild(pinBlock);
            card.querySelector('#wBtnConfirmFamily').onclick = confirmFamily;
          }
          pinBlock.classList.remove('hidden');
          card.querySelector('#wPinInput')?.focus();
        };
      });

      // Toggle criar família
      card.querySelector('#wToggleCreate').onclick = ()=>{
        const f = card.querySelector('#wCreateFamilyForm');
        f.classList.toggle('hidden');
      };

      // Criar família
      const createBtn = card.querySelector('#wBtnCreateFamily');
      if(createBtn) createBtn.onclick = async ()=>{
        const name = card.querySelector('#wNewFamilyName').value.trim();
        const pin = card.querySelector('#wNewFamilyPin').value.trim();
        if(!name || pin.length < 4) return showToast('Informe nome e PIN com pelo menos 4 dígitos.');
        createBtn.disabled=true; createBtn.textContent='Criando…';
        const {data,error} = await state.supabase.from('families').insert({trip_id:state.currentTrip.id, name, pin_hash:pin}).select().single();
        if(error){ createBtn.disabled=false; createBtn.textContent='Criar família'; return showToast(error.message); }
        state.currentFamily = data;
        state.familyPinVerified = true;
        state.familyPin = pin;
        await refreshAll();
        renderWizardStep(2);

      // Confirmar PIN
      const confirmBtn = card.querySelector('#wBtnConfirmFamily');
      if(confirmBtn) confirmBtn.onclick = confirmFamily;

        const fam = state.cache.families.find(f=>f.id === selectedFamilyId);

        renderWizardStep(2);
      }

      // Enter no PIN
      card.querySelector('#wPinInput')?.addEventListener('keydown', e=>{ if(e.key==='Enter') confirmFamily(); });
    }

    let _googleMapsCallbacks = [];

    function loadGoogleMaps(cb){
      if(_googleMapsLoaded){ cb(); return; }
      _googleMapsCallbacks.push(cb);
      if(_googleMapsLoading) return;
      _googleMapsLoading = true;
      window._googleMapsReady = () => {
        _googleMapsLoaded = true;
        _googleMapsLoading = false;
        _googleMapsCallbacks.forEach(f => f());
        _googleMapsCallbacks = [];
      };
      const s = document.createElement('script');
      s.src = `https://maps.googleapis.com/maps/api/js?key=${GPLACES_KEY}&libraries=places&callback=_googleMapsReady&language=pt-BR&region=BR`;
      s.async = true; s.defer = true;
      s.onerror = () => { _googleMapsLoading = false; _googleMapsCallbacks = []; };
      document.head.appendChild(s);
    }

    // Fetch place details (phone, website) by place_id
    async function fetchGooglePlaceDetails(placeId){
      return new Promise(resolve => {
        loadGoogleMaps(() => {
          const svc = new google.maps.places.PlacesService(document.createElement('div'));
          svc.getDetails({
            placeId,
            fields: ['name','formatted_address','formatted_phone_number','website','geometry']
          }, (result, status) => {
            if(status === google.maps.places.PlacesServiceStatus.OK) resolve(result);
            else resolve(null);
          });
        });
      });
    }

    // ── attachPlaceSearch ─────────────────────────────────────────────────────
    // Attaches Google Places Autocomplete to an input.
    // opts.fillAddr   — id of address field to fill
    // opts.fillName   — id of name field to fill
    // opts.fillPhone  — id of phone field to fill
    function attachPlaceSearch(inputEl, opts = {}){
      if(!inputEl || inputEl.dataset.placeAttached) return;
      inputEl.dataset.placeAttached = '1';

      try {
        loadGoogleMaps(() => {
          try {
            const autocomplete = new google.maps.places.Autocomplete(inputEl, {
              componentRestrictions: { country: 'br' },
              fields: ['name','formatted_address','formatted_phone_number','geometry','place_id'],
              types: []
            });

            autocomplete.addListener('place_changed', async () => {
              try {
                const place = autocomplete.getPlace();
                if(!place || !place.name) return;

                const resolvedName = place.name;
                const cleanAddr    = place.formatted_address || '';
                let   phone        = place.formatted_phone_number || '';

                if(!phone && place.place_id){
                  const details = await fetchGooglePlaceDetails(place.place_id);
                  if(details) phone = details.formatted_phone_number || '';
                }

                if(opts.fillAddr){
                  inputEl.value = resolvedName;
                  const addrEl = document.getElementById(opts.fillAddr);
                  if(addrEl) addrEl.value = cleanAddr;
                } else if(opts.fillName){
                  inputEl.value = cleanAddr;
                  const nameEl = document.getElementById(opts.fillName);
                  if(nameEl) nameEl.value = resolvedName;
                } else {
                  inputEl.value = resolvedName + (cleanAddr ? ', ' + cleanAddr : '');
                }

                if(phone && opts.fillPhone){
                  const phoneEl = document.getElementById(opts.fillPhone);
                  if(phoneEl) phoneEl.value = phone;
                }

                if(opts.onSelect) opts.onSelect({ name: resolvedName, address: cleanAddr, phone });
              } catch(e){ /* place_changed error — field still usable manually */ }
            });

            // Style Google autocomplete dropdown
            const observer = new MutationObserver(() => {
              document.querySelectorAll('.pac-container').forEach(el => {
                el.style.borderRadius = '14px';
                el.style.border = '1.5px solid #d8b4fe';
                el.style.boxShadow = '0 12px 32px rgba(17,5,40,.12)';
                el.style.fontFamily = 'inherit';
                el.style.zIndex = '9999';
              });
            });
            observer.observe(document.body, { childList: true, subtree: true });
          } catch(e){ /* Google Maps init failed — fields work manually */ }
        });
      } catch(e){ /* loadGoogleMaps failed — fields work manually */ }
    }

    // Split "Nome — Endereço" into {name, addr}
    function splitNameAddr(val){
      if(!val) return { name:'', addr:'' };
      const sep = val.indexOf(' — ');
      if(sep === -1) return { name: val.trim(), addr:'' };
      return { name: val.slice(0, sep).trim(), addr: val.slice(sep+3).trim() };
    }

    // ── openMapPicker — Google Maps iframe picker ─────────────────────────────
    function openMapPicker(opts = {}){
      const overlay = document.getElementById('mapPickerOverlay');
      overlay.classList.remove('hidden');
      const searchInput = document.getElementById('mapPickerSearchInput');
      const closeBtn    = document.getElementById('mapPickerCloseBtn');
      const status      = document.getElementById('mapPickerStatus');
      const confirmBtn  = document.getElementById('mapPickerConfirmBtn');
      const mapDiv      = document.getElementById('mapPickerLeaflet');

      if(opts.initialQuery) searchInput.value = opts.initialQuery;
      confirmBtn.disabled = true;
      status.textContent  = 'Busque um local acima para selecionar.';
      let pickedResult = null;

      closeBtn.onclick = () => overlay.classList.add('hidden');

      loadGoogleMaps(() => {
        // Init map centered on Brazil
        const map = new google.maps.Map(mapDiv, {
          center: { lat: -15.8, lng: -47.9 },
          zoom: 5,
          mapTypeControl: false,
          streetViewControl: false,
          fullscreenControl: false,
        });

        let marker = null;

        // Search box
        const searchBox = new google.maps.places.SearchBox(searchInput);
        map.addListener('bounds_changed', () => searchBox.setBounds(map.getBounds()));

        searchBox.addListener('places_changed', () => {
          const places = searchBox.getPlaces();
          if(!places || !places.length) return;
          const place = places[0];
          if(!place.geometry) return;
          map.fitBounds(place.geometry.viewport || new google.maps.LatLngBounds(place.geometry.location, place.geometry.location));
          map.setZoom(17);
          if(marker) marker.setMap(null);
          marker = new google.maps.Marker({ map, position: place.geometry.location, title: place.name });
          pickedResult = { name: place.name, address: place.formatted_address || '', lat: place.geometry.location.lat(), lng: place.geometry.location.lng() };
          status.innerHTML = `<b>${escapeHtml(place.name)}</b> — ${escapeHtml(place.formatted_address||'')}`;
          confirmBtn.disabled = false;
        });

        // Click on map for reverse geocode
        const geocoder = new google.maps.Geocoder();
        map.addListener('click', e => {
          if(marker) marker.setMap(null);
          marker = new google.maps.Marker({ map, position: e.latLng });
          geocoder.geocode({ location: e.latLng }, (results, gstatus) => {
            if(gstatus === 'OK' && results[0]){
              const r = results[0];
              const name = r.name || r.formatted_address.split(',')[0];
              pickedResult = { name, address: r.formatted_address, lat: e.latLng.lat(), lng: e.latLng.lng() };
              status.innerHTML = `<b>${escapeHtml(name)}</b> — ${escapeHtml(r.formatted_address)}`;
              confirmBtn.disabled = false;
            }
          });
        });

        if(opts.initialQuery){
          // Trigger search automatically
          const svc = new google.maps.places.PlacesService(map);
          svc.findPlaceFromQuery({ query: opts.initialQuery, fields: ['name','geometry','formatted_address'] }, (results, st) => {
            if(st === google.maps.places.PlacesServiceStatus.OK && results[0]){
              const p = results[0];
              map.setCenter(p.geometry.location);
              map.setZoom(17);
              marker = new google.maps.Marker({ map, position: p.geometry.location, title: p.name });
              pickedResult = { name: p.name, address: p.formatted_address||'', lat: p.geometry.location.lat(), lng: p.geometry.location.lng() };
              status.innerHTML = `<b>${escapeHtml(p.name)}</b> — ${escapeHtml(p.formatted_address||'')}`;
              confirmBtn.disabled = false;
            }
          });
        }
      });

      confirmBtn.onclick = () => {
        if(!pickedResult) return;
        overlay.classList.add('hidden');
        if(opts.onConfirm) opts.onConfirm(pickedResult);
      };
    }

    // Save a family expense
    async function saveFamilyExpense(desc, valor, data, refType, refId){
      if(!state.currentFamily) return { error: 'Selecione sua família primeiro.' };
      const payload = {
        trip_id:   state.currentTrip.id,
        family_id: state.currentFamily.id,
        descricao: desc,
        valor:     Number(valor),
        data:      data || new Date().toISOString().slice(0,10),
        ref_type:  refType || null,   // 'attraction','hotel','park', etc.
        ref_id:    refId   || null,
        tipo:      'familia'
      };
      const { data: row, error } = await state.supabase
        .from('family_expenses')
        .insert(payload).select('id').single();
      if(error) return { error: error.message };
      // refresh only family expenses
      const { data: rows } = await state.supabase
        .from('family_expenses')
        .select('*')
        .eq('trip_id', state.currentTrip.id)
        .order('data', { ascending: true });
      state.cache.familyExpenses = rows || [];
      return { ok: true };
    }

    async function deleteFamilyExpense(id){
      await state.supabase.from('family_expenses').delete().eq('id', id);
      state.cache.familyExpenses = (state.cache.familyExpenses || []).filter(e => e.id !== id);
    }

      function render(){

          (!refId   || e.ref_id === refId)

        if(btn) btn.classList.toggle('active', state.currentTab === tabId);
      });
      const maisBtn = document.getElementById('bnavMais');
      if(maisBtn) maisBtn.classList.toggle('active', !mainTabs.includes(state.currentTab));
    }

    function updateBottomNav(){
      if(!state.currentTrip) return;
      const nav = document.getElementById('bottomNav');
      if(!nav) return;
      const topbar = document.getElementById('topbarCompact');
      const fab = document.getElementById('fabAdd');
      if(topbar) topbar.classList.remove('hidden');
      if(fab) fab.classList.remove('hidden');

      // Update trip name
      const tripNameEl = document.getElementById('topbarTripName');
      if(tripNameEl) tripNameEl.textContent = state.currentTrip.name;

      // Update profile label — show member name or family name, never "Sem família ativa"
      const profileLabel = document.getElementById('topbarProfileLabel');
      if(profileLabel){
        if(state.currentMember) profileLabel.textContent = state.currentMember.name;
        else if(state.currentFamily) profileLabel.textContent = state.currentFamily.name;
        else profileLabel.textContent = '👤 Identificar';
      }

      // Ensure onclick always wired (idempotent)
      mainTabs.forEach(tabId => {
        const btn = document.getElementById(`bnav${tabId.charAt(0).toUpperCase()+tabId.slice(1)}`);
        if(!btn) return;
        btn.onclick = () => switchTab(tabId);
        btn.classList.toggle('active', state.currentTab === tabId);
      });
      const maisBtn = document.getElementById('bnavMais');
      if(maisBtn){
        maisBtn.onclick = openMoreDrawer;
        maisBtn.classList.toggle('active', !mainTabs.includes(state.currentTab));
        // Chat unread badge
        let badge = maisBtn.querySelector('.bnav-badge');
        const unread = typeof getChatUnreadCount === 'function' ? getChatUnreadCount() : 0;
        if(unread > 0){
          if(!badge){ badge = document.createElement('span'); badge.className='bnav-badge'; maisBtn.appendChild(badge); }
          badge.textContent = unread;
        } else if(badge){ badge.remove(); }
      }
      const profileBtn = document.getElementById('topbarProfileBtn');
      if(profileBtn) profileBtn.onclick = () => openWizard(1);
      const sosBtn = document.getElementById('topbarSosBtn');
      if(sosBtn) sosBtn.onclick = openSOS;
      const fabBtn = document.getElementById('fabAdd');
      if(fabBtn) fabBtn.onclick = openAddSheet;
    }

    function openMoreDrawer(){
      const overlay = document.getElementById('moreDrawer');
      overlay.classList.remove('hidden');
      const grid = document.getElementById('moreDrawerGrid');
      grid.innerHTML = '';
      const drawerTabs = ['voos','parques','atracoes','alarmes','chat','ponto','documentos','galeria'];
      drawerTabs.forEach(tabId => {
        const item = document.createElement('button');
        item.className = 'more-drawer-item' + (state.currentTab === tabId ? ' active' : '');
        if(state.currentTab === tabId) item.style.background = '#ede9fe';
        item.innerHTML = (moreTabIcons[tabId]||'') + `<span>${moreTabLabels[tabId]||tabId}</span>`;
        item.onclick = () => {
          overlay.classList.add('hidden');
          switchTab(tabId);
        };
        grid.appendChild(item);
      });
      overlay.onclick = e => { if(e.target===overlay) overlay.classList.add('hidden'); };
      document.getElementById('moreDrawerClose').onclick = () => overlay.classList.add('hidden');
    }

    // FAB tabs that have an add action
    const fabTabs = ['roteiro','transporte','hospedagem','voos','parques','atracoes','alarmes','rateios','galeria','documentos'];
    function updateFab(){
      if(!state.currentTrip) return;
      const fab = document.getElementById('fabAdd');
      if(fab) fab.classList.toggle('hidden', !fabTabs.includes(state.currentTab));
    }

    function openAddSheet(){
      // Find the first form/card in tabContent and scroll to it
      const tabContent = document.getElementById('tabContent');
      const firstForm = tabContent.querySelector('.form-grid, form, #form-rateios, #form-transporte, #form-hotel, #form-ponto');
      if(firstForm){
        firstForm.scrollIntoView({behavior:'smooth', block:'start'});
        firstForm.classList.add('form-spotlight');
        setTimeout(()=>firstForm.classList.remove('form-spotlight'), 900);
      }
    }


    function emptyState(icon, title, desc){
      const div = document.createElement('div');
      div.style.cssText = 'text-align:center;padding:40px 24px;display:flex;flex-direction:column;align-items:center;gap:10px';
      div.innerHTML = `
        <div style="font-size:48px;line-height:1">${icon}</div>
        <div style="font-size:16px;font-weight:900;color:#1f2937">${title}</div>
        <div style="font-size:13px;color:#6b7280;max-width:260px;line-height:1.5">${desc}</div>`;
      return div;
    }
</script>

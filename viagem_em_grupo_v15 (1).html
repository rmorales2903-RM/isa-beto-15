
<!DOCTYPE html> 

<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Viagem em Grupo - Supabase</title>
<meta content="#2563eb" name="theme-color"/>
<style>
    :root{
      --primary:#4b1fa6;
      --primary-2:#35156f;
      --primary-3:#ede9fe;
      --bg:#eef1f5;
      --bg-2:#f8fafc;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --border:#d7dce5;
      --danger:#dc2626;
      --danger-bg:#fef2f2;
      --success:#16a34a;
      --success-bg:#f0fdf4;
      --warning:#f59e0b;
      --shadow:0 16px 38px rgba(17,24,39,.10);
      --shadow-soft:0 8px 24px rgba(17,24,39,.06);
      --radius:24px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:linear-gradient(180deg,#2d115f 0,#4b1fa6 160px,#eef1f5 161px,#eef1f5 100%);
      color:var(--text);
    }
    .hidden{display:none!important}
    .app-shell{max-width:1180px;margin:0 auto;padding:14px 14px 90px}
    .topbar{
      display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:16px;
      background:rgba(255,255,255,.94);backdrop-filter: blur(14px);border:1px solid rgba(255,255,255,.75);
      box-shadow:var(--shadow);padding:16px 18px;border-radius:28px;position:sticky;top:8px;z-index:30;
    }
    .brand{display:flex;gap:12px;align-items:center}
    .brand-badge{
      width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--primary),#7c3aed);
      display:grid;place-items:center;color:#fff;font-weight:900;box-shadow:var(--shadow-soft);flex:0 0 auto
    }
    h1,h2,h3,h4{margin:0}
    .muted{color:var(--muted)}
    .grid{display:grid;gap:16px}
    .grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .card{
      background:var(--card);border:1px solid rgba(215,220,229,.85);box-shadow:var(--shadow-soft);
      border-radius:var(--radius);padding:18px;
    }
    .hero{display:grid;grid-template-columns:1.2fr .8fr;gap:18px;align-items:stretch}
    .hero .card{padding:24px}
    .btn{
      border:none;border-radius:16px;padding:13px 16px;font-weight:800;cursor:pointer;
      background:linear-gradient(135deg,var(--primary),#6d28d9);color:#fff;box-shadow:0 10px 24px rgba(76,29,149,.24)
    }
    .btn:hover{filter:brightness(.98)}
    .btn.secondary{background:#fff;color:var(--text);border:1px solid var(--border);box-shadow:none}
    .btn.ghost{background:transparent;color:var(--primary);box-shadow:none;border:1px dashed #c4b5fd}
    .btn.danger{background:linear-gradient(135deg,#dc2626,#ef4444)}
    .btn.success{background:linear-gradient(135deg,#16a34a,#22c55e)}
    .btn.small{padding:9px 12px;border-radius:13px;font-size:13px}
    .btn-row{display:flex;gap:10px;flex-wrap:wrap}
    input,select,textarea{
      width:100%;padding:13px 14px;border-radius:16px;border:1px solid var(--border);
      background:#fff;color:var(--text);font:inherit;outline:none
    }
    input:focus,select:focus,textarea:focus{border-color:#b197fc;box-shadow:0 0 0 4px rgba(109,40,217,.10)}
    textarea{min-height:120px;resize:vertical}
    label{font-weight:800;font-size:14px;margin-bottom:6px;display:block}
    .field{display:grid;gap:6px}
    .form-grid{display:grid;gap:12px;grid-template-columns:repeat(2,minmax(0,1fr))}
    .tabs{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:14px 0 16px}
    .tab{
      padding:14px 14px;border-radius:22px;border:1px solid var(--border);background:#fff;cursor:pointer;font-weight:800;color:var(--text);
      display:flex;align-items:center;gap:12px;min-height:78px;box-shadow:var(--shadow-soft);text-align:left
    }
    .tab.active{background:linear-gradient(135deg,var(--primary),#6d28d9);border-color:transparent;color:#fff;box-shadow:0 14px 26px rgba(76,29,149,.28)}
    .tab-icon{
      width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--primary-3),#ddd6fe);position:relative;flex:0 0 auto;
    }
    .tab.active .tab-icon{background:rgba(255,255,255,.18)}
    .tab-label{display:flex;flex-direction:column;gap:2px;line-height:1.1}
    .tab-label small{font-size:11px;color:inherit;opacity:.72;font-weight:700}
    .section-header{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
    .list{display:grid;gap:12px}
    .item{padding:15px;border:1px solid #e7ebf2;border-radius:18px;background:#fff;box-shadow:var(--shadow-soft)}
    .item-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .pill{
      display:inline-flex;gap:6px;align-items:center;padding:8px 11px;border-radius:999px;
      background:var(--primary-3);color:var(--primary);font-weight:800;font-size:12px
    }
    .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
    .stat{background:#fff;border:1px solid #e7ebf2;border-radius:20px;padding:15px;box-shadow:var(--shadow-soft)}
    .kpi{font-size:28px;font-weight:900;line-height:1.05}
    .modal{position:fixed;inset:0;background:rgba(15,23,42,.60);display:none;align-items:flex-end;justify-content:center;padding:16px;z-index:100}
    .modal.open{display:flex}
    .modal-card{width:min(980px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:28px;padding:18px;box-shadow:var(--shadow)}
    .split{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .media-box{
      min-height:240px;border:1px dashed #c4b5fd;border-radius:20px;background:#faf7ff;padding:12px;
      display:grid;place-items:center;overflow:hidden
    }
    .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
    .gallery-card{background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:10px}
    .gallery-card img{width:100%;height:140px;object-fit:cover;border-radius:14px;background:#eef2ff}
    .fine{font-size:12px;color:var(--muted)}
    .inline-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .empty{padding:24px;text-align:center;color:var(--muted);border:1px dashed #d1d5db;border-radius:18px;background:#fff}
    .divider{height:1px;background:#eceff5;margin:16px 0}
    .sos{position:fixed;right:16px;bottom:18px;border-radius:999px;padding:16px 20px;background:#dc2626;color:#fff;font-weight:900;border:none;box-shadow:var(--shadow);cursor:pointer;z-index:40}
    .auth-note{background:#f5f3ff;border:1px solid #ddd6fe;color:#5b21b6;padding:12px 14px;border-radius:16px}
    .code-badge{font-size:24px;font-weight:900;letter-spacing:2px;padding:10px 14px;background:#f5f3ff;color:#5b21b6;border-radius:16px;display:inline-block}
    .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .nowrap{white-space:nowrap}
    .tableish{display:grid;gap:10px}
    .table-row{display:grid;grid-template-columns:1.1fr .9fr .9fr .6fr;gap:10px;padding:10px 0;border-bottom:1px solid #f1f5f9}
    .table-row.header{font-weight:800;color:#6b7280}
    .viewer-iframe{width:100%;height:420px;border:none;border-radius:18px;background:#f3f4f6}
    .form-spotlight{position:relative;z-index:2;animation:formPulse .9s ease;box-shadow:0 0 0 4px rgba(76,29,149,.14), 0 18px 40px rgba(76,29,149,.12)!important;border-radius:20px}
    .tab-content-spotlight{animation:contentPulse .5s ease}
    @keyframes formPulse{0%{transform:translateY(8px);opacity:.72}60%{transform:translateY(0);opacity:1}100%{transform:translateY(0);opacity:1}}
    @keyframes contentPulse{0%{opacity:.65}100%{opacity:1}}

    .section-card-title{font-size:20px;font-weight:900;margin-bottom:6px}
    .panel-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .doc-layout{display:grid;gap:16px}
    .doc-preview-card,.doc-upload-card,.rateio-summary-card,.rateio-balance-card,.settlement-card{
      background:#fff;border:1px solid #e7ebf2;border-radius:22px;padding:16px;box-shadow:var(--shadow-soft)
    }
    .doc-preview-card h4,.doc-upload-card h4,.rateio-summary-card h4{margin-bottom:6px}
    .doc-upload-card{background:#fcfbff}
    .doc-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    .rateio-hero{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .rateio-summary-card{background:linear-gradient(135deg,var(--primary),#6d28d9);color:#fff;border:none;box-shadow:0 14px 28px rgba(76,29,149,.28)}
    .rateio-summary-card .fine{color:rgba(255,255,255,.82)}
    .rateio-balance-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .rateio-balance-card.recebe{background:var(--success-bg);border-color:#bbf7d0}
    .rateio-balance-card.paga{background:var(--danger-bg);border-color:#fecaca}
    .rateio-balance-card.quitado{background:#f8fafc}
    .rateio-status{font-size:12px;font-weight:900;letter-spacing:.4px;margin-bottom:8px}
    .rateio-value{font-size:34px;font-weight:900;line-height:1.05;margin:6px 0}
    .settlement-card{display:grid;gap:10px}
    .settlement-head{display:flex;justify-content:space-between;gap:12px;align-items:center}
    .settlement-flow{font-size:16px;font-weight:900}
    .settlement-flow strong{color:var(--danger)}
    .settlement-flow span{color:var(--success)}
    .tab-icon::before,.tab-icon::after{content:"";position:absolute;background:currentColor}
    .tab{--icon-color:#5b21b6}
    .tab.active{--icon-color:#fff}
    .tab-icon{color:var(--icon-color)}
    .tab-roteiro .tab-icon::before{width:18px;height:14px;border:2px solid currentColor;border-top:none;border-radius:0 0 6px 6px;left:13px;top:14px;background:transparent}
    .tab-roteiro .tab-icon::after{width:16px;height:2px;left:14px;top:12px;box-shadow:0 6px 0 currentColor,0 12px 0 currentColor}
    .tab-transporte .tab-icon::before{width:20px;height:10px;left:12px;top:16px;border-radius:6px 6px 3px 3px;background:currentColor}
    .tab-transporte .tab-icon::after{width:6px;height:6px;left:14px;top:28px;border-radius:50%;box-shadow:12px 0 0 currentColor}
    .tab-hospedagem .tab-icon::before{width:20px;height:16px;left:12px;top:14px;border:2px solid currentColor;background:transparent}
    .tab-hospedagem .tab-icon::after{width:6px;height:6px;left:18px;top:18px;box-shadow:8px 0 0 currentColor,0 8px 0 currentColor,8px 8px 0 currentColor}
    .tab-voos .tab-icon::before{width:20px;height:2px;left:12px;top:21px;transform:rotate(35deg)}
    .tab-voos .tab-icon::after{width:8px;height:8px;left:18px;top:16px;transform:skewX(-20deg);border-top:2px solid currentColor;border-right:2px solid currentColor;background:transparent}
    .tab-parques .tab-icon::before{width:20px;height:14px;left:12px;top:14px;border:2px solid currentColor;border-radius:10px 10px 4px 4px;background:transparent}
    .tab-parques .tab-icon::after{width:14px;height:2px;left:15px;top:22px;box-shadow:0 -6px 0 currentColor,0 6px 0 currentColor}
    .tab-atracoes .tab-icon::before{width:16px;height:16px;left:14px;top:14px;border-radius:50%;border:2px solid currentColor;background:transparent}
    .tab-atracoes .tab-icon::after{width:2px;height:16px;left:21px;top:14px;box-shadow:-7px 7px 0 -1px currentColor,7px 7px 0 -1px currentColor}
    .tab-alarmes .tab-icon::before{width:16px;height:16px;left:14px;top:14px;border-radius:50%;border:2px solid currentColor;background:transparent}
    .tab-alarmes .tab-icon::after{width:2px;height:6px;left:21px;top:18px;box-shadow:4px 4px 0 currentColor,-9px -4px 0 -1px currentColor,9px -4px 0 -1px currentColor}
    .tab-rateios .tab-icon::before{width:18px;height:18px;left:13px;top:13px;border-radius:50%;border:2px solid currentColor;background:transparent}
    .tab-rateios .tab-icon::after{width:10px;height:2px;left:17px;top:21px;box-shadow:0 -6px 0 currentColor,0 6px 0 currentColor}
    .tab-chat .tab-icon::before{width:20px;height:14px;left:12px;top:14px;border-radius:10px;background:currentColor}
    .tab-chat .tab-icon::after{width:8px;height:8px;left:16px;top:24px;transform:rotate(45deg)}
    .tab-ponto .tab-icon::before{width:16px;height:16px;left:14px;top:12px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid currentColor;background:transparent}
    .tab-ponto .tab-icon::after{width:4px;height:4px;left:20px;top:20px;border-radius:50%}
    .tab-documentos .tab-icon::before{width:16px;height:20px;left:14px;top:12px;border:2px solid currentColor;border-radius:4px;background:transparent}
    .tab-documentos .tab-icon::after{width:8px;height:2px;left:18px;top:18px;box-shadow:0 6px 0 currentColor,0 12px 0 currentColor}
    .tab-galeria .tab-icon::before{width:20px;height:16px;left:12px;top:14px;border:2px solid currentColor;border-radius:4px;background:transparent}
    .tab-galeria .tab-icon::after{width:12px;height:8px;left:16px;top:20px;clip-path:polygon(0 100%,35% 40%,60% 70%,78% 48%,100% 100%);}


    .roteiro-toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
    .roteiro-days{display:grid;gap:14px}
    .roteiro-day-card{background:#fff;border:1px solid rgba(209,213,219,.75);border-radius:22px;overflow:hidden;box-shadow:var(--shadow);display:grid;gap:0}
    .roteiro-day-header{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;background:linear-gradient(135deg,#4b1fa6,#7c3aed);padding:16px 18px;border-radius:0}
    .roteiro-day-title{display:grid;gap:4px}
    .roteiro-day-badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:999px;background:rgba(255,255,255,.2);color:#fff;font-weight:900;font-size:13px;letter-spacing:.3px;width:fit-content}
    .roteiro-day-header h3{color:#fff!important;font-size:18px!important;font-weight:900}
    .roteiro-day-header .roteiro-day-total{color:rgba(255,255,255,.85);font-size:13px;font-weight:700;background:rgba(255,255,255,.15);padding:4px 12px;border-radius:999px;white-space:nowrap}
    .roteiro-day-header div[style*="7c3aed"]{color:rgba(255,255,255,.85)!important}
    .roteiro-events{padding:14px 18px;display:grid;gap:12px}
    .roteiro-day-total{font-size:12px;color:var(--muted);font-weight:700}
    .roteiro-events{display:grid;gap:12px}
    .roteiro-event-card{border:1px solid #ece7ff;background:#faf8ff;border-radius:18px;padding:14px;display:grid;gap:10px}
    .roteiro-event-card.tipo-transporte{background:#f8fbff;border-color:#dbeafe}
    .roteiro-event-card.tipo-hospedagem{background:#faf5ff;border-color:#e9d5ff}
    .roteiro-event-card.tipo-alarme{background:#fff7ed;border-color:#fed7aa}
    .roteiro-event-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap}
    .roteiro-event-label{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;background:#ede9fe;color:#5b21b6;font-size:11px;font-weight:900;letter-spacing:.3px;text-transform:uppercase}
    .roteiro-event-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .roteiro-event-time{font-size:18px;color:#1f2937;font-weight:900;letter-spacing:.2px}
    .roteiro-event-title{font-size:16px;font-weight:900;color:#1f2937}
    .roteiro-alarm-inline{display:inline-flex;align-items:center;gap:8px;padding:7px 10px;border-radius:999px;background:#fff;border:1px solid #e9d5ff;box-shadow:var(--shadow-soft);flex-wrap:wrap}
    .roteiro-alarm-icon{position:relative;width:22px;height:22px;border-radius:999px;border:2px solid #7c3aed;display:inline-block}
    .roteiro-alarm-icon::before{content:"";position:absolute;width:2px;height:7px;background:#7c3aed;left:8px;top:3px;box-shadow:5px 4px 0 #7c3aed}
    .roteiro-alarm-icon::after{content:"";position:absolute;width:4px;height:4px;border-top:2px solid #7c3aed;border-left:2px solid #7c3aed;left:-3px;top:-3px;transform:rotate(-45deg);box-shadow:16px 0 0 -2px #7c3aed}
    .roteiro-alarm-time{font-size:12px;font-weight:800;color:#6d28d9}
    .roteiro-alarm-toggle{border:none;border-radius:999px;padding:6px 10px;font-size:11px;font-weight:900;cursor:pointer}
    .roteiro-alarm-toggle.on{background:#16a34a;color:#fff}
    .roteiro-alarm-toggle.off{background:#efe9ff;color:#5b21b6}
    .roteiro-alarm-input{width:92px;padding:6px 8px;border-radius:10px;border:1px solid #d8b4fe;background:#faf5ff;color:#5b21b6;font-size:12px;font-weight:800}
    .roteiro-alarm-label{font-size:11px;color:#7c3aed;font-weight:900;text-transform:uppercase;letter-spacing:.3px}

    .roteiro-event-lines{display:grid;gap:6px}
    .roteiro-event-line{font-size:14px;color:#374151}
    .roteiro-event-line strong{color:#111827}
    .roteiro-actions{display:flex;gap:8px;flex-wrap:wrap}
    .roteiro-empty{padding:14px;border:1px dashed #d8b4fe;border-radius:16px;color:#6b7280;text-align:center;background:#faf5ff}
    .roteiro-notes-card textarea{min-height:140px}

    @media (max-width:900px){
      .hero,.split,.grid-2,.grid-3,.form-grid,.stats,.table-row,.rateio-hero,.rateio-balance-grid{grid-template-columns:1fr}
      .topbar{position:static}
      .tabs{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
    @media (max-width:560px){
      .app-shell{padding:12px 12px 96px}
      .topbar{padding:14px 14px 16px;border-radius:24px}
      .brand-badge{width:44px;height:44px}
      .tabs{gap:10px}
      .tab{min-height:74px;padding:12px;border-radius:18px}
      .tab-icon{width:40px;height:40px;border-radius:13px}
      .kpi{font-size:24px}
      .rateio-value{font-size:30px}
      .viewer-iframe{height:360px}
    }
  

    /* Pente-fino seguro: apenas visual, sem alterar lógica */
    .topbar{box-shadow:0 18px 42px rgba(17,24,39,.12)}
    .card,.item,.stat,.gallery-card,.doc-preview-card,.doc-upload-card,.rateio-summary-card,.rateio-balance-card,.settlement-card{
      transition:box-shadow .18s ease, transform .18s ease, border-color .18s ease;
    }
    .card:hover,.item:hover,.stat:hover,.gallery-card:hover,.doc-preview-card:hover,.doc-upload-card:hover,.rateio-balance-card:hover,.settlement-card:hover{
      box-shadow:0 18px 34px rgba(17,24,39,.10);
    }
    .btn{transition:transform .14s ease, box-shadow .14s ease, filter .14s ease}
    .btn:hover{transform:translateY(-1px);box-shadow:0 12px 26px rgba(76,29,149,.26)}
    .btn.secondary:hover,.btn.ghost:hover{box-shadow:0 10px 18px rgba(17,24,39,.08)}
    .btn:active{transform:translateY(0)}
    .btn:focus-visible,.tab:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{
      outline:none;box-shadow:0 0 0 4px rgba(109,40,217,.14);
    }
    .section-card-title{letter-spacing:-.02em}
    .fine{line-height:1.45}
    .item-head > div:first-child,.section-header > div:first-child{min-width:0}
    .code-badge{box-shadow:inset 0 0 0 1px rgba(91,33,182,.08)}
    .pill{box-shadow:inset 0 0 0 1px rgba(91,33,182,.06)}
    .tabs{margin-top:16px}
    .tab{position:relative;overflow:hidden}
    .tab::after{
      content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.10),transparent 48%);pointer-events:none;
    }
    .modal-card::-webkit-scrollbar{width:10px}
    .modal-card::-webkit-scrollbar-thumb{background:#d8c8ff;border-radius:999px;border:2px solid #fff}
    .modal-card::-webkit-scrollbar-track{background:transparent}
    .inline-actions .btn.small{min-height:38px}
    .viewer-iframe,.media-box img{box-shadow:0 6px 18px rgba(15,23,42,.06)}
    .gallery-card img{height:150px}
    .empty{background:linear-gradient(180deg,#fff,#fafbff)}
    .rateio-value{letter-spacing:-.03em}
    .settlement-flow{letter-spacing:-.01em}
    .doc-upload-card{border-style:dashed}
    .auth-note{box-shadow:inset 0 0 0 1px rgba(124,58,237,.08)}
    @media (max-width:900px){
      .app-shell{padding:12px 12px 92px}
      .topbar{padding:15px 16px;border-radius:24px}
      .card{padding:16px}
      .item{padding:14px}
      .btn{min-height:46px}
      .btn.small{min-height:38px}
      .tab{min-height:74px;padding:13px}
      .kpi{font-size:26px}
    }


    /* ── Wizard de onboarding ── */
    .wizard-overlay{position:fixed;inset:0;background:rgba(17,5,40,.72);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
    .wizard-overlay.hidden{display:none!important}
    .wizard-card{background:#fff;border-radius:28px;padding:28px 24px;width:min(520px,100%);max-height:92vh;overflow-y:auto;box-shadow:0 28px 60px rgba(17,5,40,.22)}
    .wizard-steps{display:flex;gap:6px;margin-bottom:20px}
    .wizard-step-dot{flex:1;height:4px;border-radius:999px;background:#ede9fe;transition:background .3s}
    .wizard-step-dot.done{background:#4b1fa6}
    .wizard-step-dot.active{background:#7c3aed}
    .wizard-title{font-size:22px;font-weight:900;color:#1f2937;margin-bottom:4px}
    .wizard-sub{font-size:14px;color:#6b7280;margin-bottom:20px}
    .wizard-family-list{display:grid;gap:8px;margin-bottom:16px}
    .wizard-family-btn{width:100%;padding:14px 16px;border-radius:16px;border:2px solid #e5e7eb;background:#fff;text-align:left;cursor:pointer;font-size:15px;font-weight:700;color:#1f2937;transition:border-color .15s,background .15s}
    .wizard-family-btn:hover{border-color:#7c3aed;background:#faf5ff}
    .wizard-family-btn.selected{border-color:#4b1fa6;background:#ede9fe;color:#4b1fa6}
    .wizard-member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px}
    .wizard-member-btn{padding:16px 10px;border-radius:16px;border:2px solid #e5e7eb;background:#fff;cursor:pointer;font-size:14px;font-weight:800;color:#1f2937;text-align:center;transition:border-color .15s,background .15s;line-height:1.3}
    .wizard-member-btn:hover{border-color:#7c3aed;background:#faf5ff}
    .wizard-member-btn.selected{border-color:#4b1fa6;background:#ede9fe;color:#4b1fa6}
    .wizard-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#4b1fa6,#7c3aed);color:#fff;font-size:18px;font-weight:900;display:grid;place-items:center;margin:0 auto 8px}
    .wizard-create-toggle{background:none;border:none;color:#7c3aed;font-size:13px;font-weight:700;cursor:pointer;padding:4px 0;margin-bottom:12px}
    .wizard-create-toggle:hover{text-decoration:underline}
    .wizard-pin-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:16px}
    .wizard-pin-row .field{flex:1;margin:0}
    .wizard-success{text-align:center;padding:12px 0 8px}
    .wizard-success-icon{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#4b1fa6,#7c3aed);color:#fff;font-size:34px;display:grid;place-items:center;margin:0 auto 16px}
    .wizard-success-name{font-size:22px;font-weight:900;color:#1f2937;margin-bottom:4px}
    .wizard-success-family{font-size:14px;color:#6b7280;margin-bottom:24px}
    .wizard-add-member-form{border:1px solid #e5e7eb;border-radius:16px;padding:14px;margin-bottom:12px;background:#fafbff}
    .wizard-add-member-form .form-grid{margin-top:8px}
    .wizard-skip{background:none;border:none;color:#9ca3af;font-size:13px;cursor:pointer;padding:4px 8px;margin-top:6px}
    .wizard-skip:hover{color:#6b7280}

    /* ── Busca de local (OpenStreetMap) ── */
    .place-search-wrap{position:relative}
    .place-search-input-row{display:flex;gap:6px;align-items:center}
    .place-search-input-row input{flex:1}
    .place-search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1.5px solid #d8b4fe;border-radius:14px;box-shadow:0 12px 32px rgba(17,5,40,.12);z-index:100;overflow:hidden;max-height:260px;overflow-y:auto}
    .place-result-item{padding:10px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid #f3f4f6;display:flex;flex-direction:column;gap:2px;transition:background .12s}
    .place-result-item:last-child{border-bottom:none}
    .place-result-item:hover,.place-result-item:focus{background:#faf5ff;outline:none}
    .place-result-name{font-weight:700;color:#1f2937}
    .place-result-addr{color:#6b7280;font-size:12px}
    .place-search-spinner{color:#7c3aed;font-size:12px;padding:10px 14px}
    .place-search-empty{color:#9ca3af;font-size:12px;padding:10px 14px}
    .place-search-btn{white-space:nowrap;flex-shrink:0}

    /* ── Mapa picker (Leaflet) ── */
    .map-modal-overlay{position:fixed;inset:0;background:rgba(17,5,40,.75);backdrop-filter:blur(4px);z-index:300;display:flex;align-items:center;justify-content:center;padding:12px}
    .map-modal-overlay.hidden{display:none!important}
    .map-modal-card{background:#fff;border-radius:20px;overflow:hidden;width:min(680px,100%);max-height:90vh;display:flex;flex-direction:column;box-shadow:0 28px 60px rgba(17,5,40,.25)}
    .map-modal-header{padding:12px 16px;display:flex;gap:8px;align-items:center;border-bottom:1px solid #e5e7eb;flex-shrink:0}
    .map-modal-header input{flex:1;padding:8px 12px;border:1.5px solid #d8b4fe;border-radius:10px;font-size:14px;outline:none}
    .map-modal-header input:focus{border-color:#7c3aed}
    .map-modal-search-btn{padding:8px 14px;background:#7c3aed;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
    .map-modal-search-btn:hover{background:#4b1fa6}
    #mapPickerLeaflet{flex:1;min-height:380px}
    .map-modal-footer{padding:10px 16px;border-top:1px solid #e5e7eb;font-size:12px;color:#6b7280;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .map-modal-footer b{color:#1f2937}
    .map-picked-label{font-size:11px;color:#7c3aed;font-weight:700;background:#ede9fe;padding:2px 8px;border-radius:999px;display:inline-block;margin-top:4px}



    /* ── Rateio day headers ── */
    .rateio-day-block{margin-bottom:24px}
    .rateio-day-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding:14px 16px;background:linear-gradient(135deg,#4b1fa6,#7c3aed);border-radius:16px;color:#fff}
    .rateio-day-number{font-size:28px;font-weight:900;line-height:1;min-width:36px}
    .rateio-day-info{flex:1}
    .rateio-day-date{font-size:15px;font-weight:800;letter-spacing:.2px}
    .rateio-day-hotel{font-size:12px;opacity:.85;margin-top:2px}
    .rateio-day-total-badge{background:rgba(255,255,255,.2);border-radius:999px;padding:4px 12px;font-size:12px;font-weight:700;white-space:nowrap}

    /* ── Gastos da família ── */
    .family-expense-section{background:#fdf4ff;border:1.5px solid #e9d5ff;border-radius:16px;padding:14px;margin-bottom:8px}
    .family-expense-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;cursor:pointer;user-select:none}
    .family-expense-title{font-size:13px;font-weight:800;color:#6b21a8;display:flex;align-items:center;gap:6px}
    .family-expense-total{font-size:13px;font-weight:900;color:#4b1fa6}
    .family-expense-list{display:grid;gap:6px}
    .family-expense-item{background:#fff;border-radius:10px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;font-size:13px;border:1px solid #e9d5ff}
    .family-expense-item-name{font-weight:700;color:#1f2937}
    .family-expense-item-meta{font-size:11px;color:#6b7280;margin-top:1px}
    .family-expense-add{display:grid;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid #e9d5ff}
    .family-expense-add-row{display:flex;gap:6px}
    .family-expense-add-row input{flex:1;padding:7px 10px;border:1.5px solid #d8b4fe;border-radius:8px;font-size:13px;outline:none;min-width:0}
    .family-expense-add-row input:focus{border-color:#7c3aed}
    .family-expense-add-btn{padding:7px 14px;background:#7c3aed;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
    .family-expense-add-btn:hover{background:#4b1fa6}
    .family-expense-add-btn:disabled{opacity:.5;cursor:not-allowed}

    /* ── Quick gasto button in roteiro ── */
    .roteiro-gasto-btn{background:linear-gradient(135deg,#7c3aed,#9333ea);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:800;cursor:pointer;transition:opacity .15s;display:inline-flex;align-items:center;gap:6px;box-shadow:0 2px 8px rgba(124,58,237,.3)}
    .roteiro-gasto-btn:hover{opacity:.88}
    .roteiro-gasto-inline{background:#fdf4ff;border:1.5px solid #d8b4fe;border-radius:12px;padding:12px;margin-top:8px;display:grid;gap:8px}
    .roteiro-gasto-inline-row{display:flex;gap:8px;align-items:center}
    .roteiro-gasto-inline-row input{flex:1;padding:8px 12px;border:1.5px solid #d8b4fe;border-radius:10px;font-size:13px;outline:none;min-width:0}
    .roteiro-gasto-inline-row input:focus{border-color:#7c3aed}
    .money-input-wrap{position:relative;display:flex;align-items:center;min-width:110px}
    .money-input-wrap::before{content:'R$';position:absolute;left:10px;color:#7c3aed;font-weight:800;font-size:13px;pointer-events:none}
    .money-input-wrap input{padding-left:36px!important;width:100%}
    .roteiro-gasto-inline-save{padding:8px 16px;background:#7c3aed;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer}
    .roteiro-gasto-inline-save:hover{background:#4b1fa6}
    .roteiro-gasto-inline-cancel{padding:8px 12px;background:none;border:1.5px solid #d1d5db;border-radius:10px;font-size:13px;color:#6b7280;cursor:pointer}

    /* ── Roteiro address link ── */
    .roteiro-addr-wrap{display:flex;flex-direction:column;gap:3px;margin-top:5px}
    .roteiro-addr-link{display:inline-flex;align-items:flex-start;gap:5px;font-size:12px;color:#7c3aed;text-decoration:none;font-weight:600;line-height:1.4;word-break:break-word}
    .roteiro-addr-link:hover{text-decoration:underline;color:#4b1fa6}
    .roteiro-addr-icon{flex-shrink:0;font-size:12px;margin-top:1px}

    /* ── Toast visual ── */
    .toast-container{position:fixed;top:env(safe-area-inset-top,0);left:0;right:0;z-index:9999;display:flex;flex-direction:column;align-items:center;padding:12px 16px;gap:8px;pointer-events:none}
    .toast{display:flex;align-items:center;gap:10px;padding:13px 18px;border-radius:999px;font-size:14px;font-weight:700;color:#fff;box-shadow:0 8px 24px rgba(0,0,0,.18);pointer-events:auto;max-width:480px;width:fit-content;animation:toastIn .25s cubic-bezier(.34,1.56,.64,1)}
    .toast.success{background:linear-gradient(135deg,#16a34a,#22c55e)}
    .toast.error{background:linear-gradient(135deg,#dc2626,#ef4444)}
    .toast.info{background:linear-gradient(135deg,#4b1fa6,#7c3aed)}
    .toast.warning{background:linear-gradient(135deg,#d97706,#f59e0b)}
    .toast.out{animation:toastOut .2s ease forwards}
    @keyframes toastIn{from{opacity:0;transform:translateY(-12px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes toastOut{to{opacity:0;transform:translateY(-8px) scale(.96)}}

    /* ── Confirm bottom sheet ── */
    .confirm-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:500;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
    .confirm-overlay.hidden{display:none}
    .confirm-sheet{background:#fff;border-radius:28px 28px 0 0;padding:24px 20px calc(24px + env(safe-area-inset-bottom,0));width:100%;max-width:560px;animation:slideUp .25s cubic-bezier(.34,1.56,.64,1)}
    .confirm-sheet-title{font-size:17px;font-weight:900;color:#1f2937;margin-bottom:6px}
    .confirm-sheet-desc{font-size:14px;color:#6b7280;margin-bottom:20px;line-height:1.5}
    .confirm-sheet-btns{display:grid;gap:10px}
    .confirm-sheet-btns .btn{width:100%;justify-content:center;padding:15px}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}

    /* ── Bottom navigation bar ── */
    .bottom-nav{
      position:fixed;bottom:0;left:0;right:0;
      background:#fff;border-top:1px solid #e5e7eb;
      display:flex;z-index:150;
      padding-bottom:env(safe-area-inset-bottom,0);
      box-shadow:0 -4px 20px rgba(17,5,40,.08);
    }
    .bottom-nav.hidden{display:none}
    .bnav-btn{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:10px 4px 8px;gap:4px;background:none;border:none;cursor:pointer;
      font-size:10px;font-weight:800;color:#6b7280;letter-spacing:.2px;
      transition:color .15s;position:relative;min-width:0;
    }
    .bnav-btn.active{color:#4b1fa6}
    .bnav-btn svg{width:24px;height:24px;flex-shrink:0}
    .bnav-btn .bnav-badge{
      position:absolute;top:6px;right:calc(50% - 18px);
      background:#ef4444;color:#fff;border-radius:999px;
      font-size:9px;font-weight:900;padding:1px 5px;min-width:16px;text-align:center;
    }
    /* Content padding for bottom nav */
    #tabContent{padding-bottom:80px}

    /* ── More drawer ── */
    .more-drawer-overlay{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:200;display:flex;align-items:flex-end}
    .more-drawer-overlay:not(.hidden){animation:fadeIn .2s}
    .more-drawer-overlay.hidden{display:none}
    .more-drawer{background:#fff;border-radius:24px 24px 0 0;padding:20px 16px calc(20px + env(safe-area-inset-bottom,0));width:100%;max-width:560px;margin:0 auto;animation:slideUp .22s cubic-bezier(.34,1.56,.64,1)}
    .more-drawer-title{font-size:13px;font-weight:900;color:#9ca3af;letter-spacing:.8px;text-transform:uppercase;margin-bottom:14px;padding:0 4px}
    .more-drawer-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .more-drawer-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;background:#f8f6ff;border-radius:18px;border:none;cursor:pointer;font-size:12px;font-weight:800;color:#4b1fa6;transition:background .12s}
    .more-drawer-item:active{background:#ede9fe}
    .more-drawer-item svg{width:28px;height:28px}

    /* Hide old tab grid */
    .tabs{display:none!important}
    
    /* Topbar compact */
    .topbar-compact{
      position:sticky;top:0;z-index:100;
      background:linear-gradient(135deg,#4b1fa6,#7c3aed);
      padding:calc(env(safe-area-inset-top,0) + 12px) 16px 12px;
      display:flex;align-items:center;justify-content:space-between;gap:12px;
    }
    .topbar-trip-name{font-size:17px;font-weight:900;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
    .topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .topbar-profile-btn{
      background:rgba(255,255,255,.2);border:none;border-radius:999px;
      padding:6px 12px;color:#fff;font-size:12px;font-weight:800;cursor:pointer;
      display:flex;align-items:center;gap:6px;white-space:nowrap;max-width:160px;overflow:hidden;
    }
    .topbar-sos-btn{background:#dc2626;border:none;border-radius:999px;padding:8px 12px;color:#fff;font-size:12px;font-weight:900;cursor:pointer}

    /* info card kept — rendered via topbar subtitle */
    /* Keep SOS button hidden (moved to topbar) */
    .sos.hidden{display:none!important}

    /* FAB */
    .fab{
      position:fixed;right:20px;bottom:calc(72px + env(safe-area-inset-bottom,0));
      width:56px;height:56px;border-radius:50%;
      background:linear-gradient(135deg,#4b1fa6,#7c3aed);
      color:#fff;font-size:28px;font-weight:300;line-height:1;
      border:none;cursor:pointer;z-index:140;
      box-shadow:0 8px 24px rgba(76,29,149,.4);
      display:flex;align-items:center;justify-content:center;
      transition:transform .15s,box-shadow .15s;
    }
    .fab:active{transform:scale(.93)}
    .fab.hidden{display:none}

    /* Form sheet (slides up) */
    .form-sheet-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:300;display:flex;align-items:flex-end;animation:fadeIn .2s}
    .form-sheet-overlay.hidden{display:none}
    .form-sheet{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:640px;margin:0 auto;max-height:92vh;overflow-y:auto;padding:0 0 calc(20px + env(safe-area-inset-bottom,0));animation:slideUp .25s cubic-bezier(.34,1.56,.64,1)}
    .form-sheet-header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f3f4f6;position:sticky;top:0;background:#fff;z-index:1;border-radius:24px 24px 0 0}
    .form-sheet-title{font-size:17px;font-weight:900;color:#1f2937}
    .form-sheet-close{background:none;border:none;color:#6b7280;font-size:20px;cursor:pointer;padding:4px;line-height:1}
    .form-sheet-body{padding:16px 20px}

    /* ── Chat com bolhas ── */
    .chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 160px);min-height:300px}
    .chat-messages{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth}
    .chat-bubble-row{display:flex;flex-direction:column;max-width:82%}
    .chat-bubble-row.mine{align-self:flex-end;align-items:flex-end}
    .chat-bubble-row.theirs{align-self:flex-start;align-items:flex-start}
    .chat-sender{font-size:11px;font-weight:800;color:#7c3aed;margin-bottom:3px;padding:0 4px}
    .chat-bubble{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.45;word-break:break-word;max-width:100%}
    .chat-bubble-row.mine .chat-bubble{background:linear-gradient(135deg,#4b1fa6,#7c3aed);color:#fff;border-bottom-right-radius:4px}
    .chat-bubble-row.theirs .chat-bubble{background:#f3f4f6;color:#1f2937;border-bottom-left-radius:4px}
    .chat-time{font-size:10px;color:#9ca3af;margin-top:3px;padding:0 4px}
    .chat-input-bar{display:flex;gap:8px;padding:10px 16px calc(10px + env(safe-area-inset-bottom,0));background:#fff;border-top:1px solid #e5e7eb;flex-shrink:0}
    .chat-input-bar input{flex:1;padding:11px 14px;border-radius:999px;border:1.5px solid #e5e7eb;font-size:14px;outline:none}
    .chat-input-bar input:focus{border-color:#b197fc}
    .chat-send-btn{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#4b1fa6,#7c3aed);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

    /* ── New item highlight ── */
    @keyframes itemHighlight{0%{background:#ede9fe;transform:scale(1.01)}100%{background:#fff;transform:scale(1)}}
    .item-new{animation:itemHighlight .8s ease forwards}
  </style>
</head>
<body>
<div class="app-shell">

<!-- Hidden compat elements for JS -->
<span id="topTripLabel" style="display:none"></span>
<span id="familyBadge" style="display:none"></span>
<button id="btnOpenFamilyModal" style="display:none"></button>
<button id="btnLogout" style="display:none"></button>

<section id="screenHome">
<div style="min-height:100vh;background:linear-gradient(160deg,#4b1fa6 0%,#7c3aed 40%,#eef1f5 40%);display:flex;flex-direction:column;align-items:center;padding:48px 20px 32px">
  <div style="display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:36px">
    <div style="width:72px;height:72px;background:rgba(255,255,255,.2);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;color:#fff;border:2px solid rgba(255,255,255,.3)">VG</div>
    <div style="text-align:center">
      <div style="font-size:24px;font-weight:900;color:#fff">Viagem em Grupo</div>
      <div style="font-size:14px;color:rgba(255,255,255,.75);margin-top:4px">Organize sua viagem com a família</div>
    </div>
  </div>
  <div style="background:#fff;border-radius:28px;padding:28px 24px;width:100%;max-width:440px;box-shadow:0 24px 60px rgba(17,5,40,.18)">
    <div class="btn-row" style="margin-bottom:20px">
      <button class="btn" id="btnShowCreate" style="flex:1">✈️ Nova viagem</button>
      <button class="btn secondary" id="btnShowJoin" style="flex:1">🔑 Entrar com código</button>
    </div>
    <!-- Create trip form -->
    <div class="hidden" id="cardCreateTrip">
      <h3 style="margin-bottom:14px">Criar nova viagem</h3>
      <div class="form-grid">
        <div class="field" style="grid-column:1/-1"><label>Nome da viagem</label><input id="createTripName" placeholder="Ex.: Beto Carrero 2026"/></div>
        <div class="field"><label>Data inicial</label><input id="createTripStart" type="date"/></div>
        <div class="field"><label>Data final</label><input id="createTripEnd" type="date"/></div>
        <div class="field" style="grid-column:1/-1"><label>Orçamento previsto</label><div class="money-input-wrap"><input id="createTripBudget" placeholder="0,00" step="0.01" type="number"/></div></div>
      </div>
      <div class="btn-row" style="margin-top:14px">
        <button class="btn" id="btnCreateTrip" style="flex:1">Criar viagem</button>
        <button class="btn secondary" id="btnCancelCreate">Cancelar</button>
      </div>
    </div>
    <!-- Join trip form -->
    <div class="hidden" id="cardJoinTrip">
      <h3 style="margin-bottom:14px">Entrar com código</h3>
      <div class="field">
        <label>Código da viagem</label>

<script>
    const SUPABASE_URL = 'https://cfvipeilwbeppqxvqpid.supabase.co';

    function showToast(msg, type){
      // Infer type from message if not provided
      if(!type){
        const m = msg.toLowerCase();
        type = m.includes('erro')||m.includes('falha')||m.includes('inválid')||m.includes('não foi') ? 'error'
             : m.includes('salvo')||m.includes('sucesso')||m.includes('✓')||m.includes('adicionado')||m.includes('criado') ? 'success'
             : m.includes('atenção')||m.includes('preencha')||m.includes('informe')||m.includes('selecione') ? 'warning'
             : 'info';
      }
      const icons = {success:'✓', error:'✕', warning:'⚠', info:'ℹ'};
      const container = document.getElementById('toastContainer');
      if(!container) return;
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.innerHTML = `<span>${icons[type]||''}</span><span>${escapeHtml(String(msg))}</span>`;
      container.appendChild(t);
      setTimeout(()=>{ t.classList.add('out'); setTimeout(()=>t.remove(), 220); }, 3200);
    }

    // confirmDelete(title, desc) → Promise<boolean>
    function confirmDelete(title, desc){
      return new Promise(resolve => {
        const overlay = document.getElementById('confirmOverlay');
        document.getElementById('confirmTitle').textContent = title || 'Confirmar exclusão';
        document.getElementById('confirmDesc').textContent = desc || 'Esta ação não pode ser desfeita.';
        overlay.classList.remove('hidden');
        const ok  = document.getElementById('confirmOkBtn');
        const cancel = document.getElementById('confirmCancelBtn');
        const cleanup = () => overlay.classList.add('hidden');
        ok.onclick     = () => { cleanup(); resolve(true); };
        cancel.onclick = () => { cleanup(); resolve(false); };
        overlay.onclick = e => { if(e.target===overlay){ cleanup(); resolve(false); } };
      });
    }

    function formatDate(v){
      if(!v) return '-';
      const d = new Date(v);
      if(Number.isNaN(d.getTime())) return v;
      return d.toLocaleString('pt-BR', {dateStyle:'short', timeStyle: v.includes('T') ? 'short' : undefined});
    }
    function formatMoney(v){
      return Number(v || 0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    }
    function escapeHtml(s=''){ return s.replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
    function codeGen(){
      const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let out='';
      for(let i=0;i<6;i++) out += chars[Math.floor(Math.random()*chars.length)];
      return out;
    }
    function getLocalRecentTrips(){ return JSON.parse(localStorage.getItem('vg_recent_trips')||'[]'); }
    function pushRecentTrip(trip){
      const list = getLocalRecentTrips().filter(x=>x.id!==trip.id);
      list.unshift({id:trip.id, code:trip.code, name:trip.name, start_date:trip.start_date, end_date:trip.end_date});
      localStorage.setItem('vg_recent_trips', JSON.stringify(list.slice(0,8)));
      renderRecentTrips();
    }


    function getCurrentMemberStorageKey(){
      if(!state.currentTrip || !state.currentFamily) return '';
      return `vg_current_member_${state.currentTrip.id}_${state.currentFamily.id}`;
    }
    function persistCurrentMember(memberId){
      const key = getCurrentMemberStorageKey();
      if(!key) return;
      localStorage.setItem(key, memberId || '');
    }
    function restoreCurrentMember(){
      const key = getCurrentMemberStorageKey();
      if(!key) return null;
      const memberId = localStorage.getItem(key) || '';
      return state.cache.members.find(m=>m.id===memberId && m.family_id===state.currentFamily?.id) || null;
    }
    function identifyCurrentMember(memberId){
      const member = state.cache.members.find(m=>m.id===memberId && m.family_id===state.currentFamily?.id);
      if(!member) return false;
      state.currentMember = member;
      persistCurrentMember(member.id);
      renderApp();
      return true;
    }
    function initSupabase(){
      if(!SUPABASE_URL || SUPABASE_URL.includes('COLE_SUA_URL')) return null;
      try{
        return window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }catch(e){
        console.error(e);
        return null;
      }
    }

    function openModal(html){
      $('#modalContent').innerHTML = html;
      $('#modalGeneric').classList.add('open');
    }
    function closeModal(){ $('#modalGeneric').classList.remove('open'); }

    $('#modalGeneric').addEventListener('click', e => {
      if(e.target.id === 'modalGeneric') closeModal();
    });

    function renderRecentTrips(){
      const wrap = $('#recentTrips');
      const list = getLocalRecentTrips();
      if(!list.length){
        wrap.innerHTML = '<div class="empty">Nenhuma viagem salva localmente ainda.</div>';
        return;
      }
      wrap.innerHTML = '';
      list.forEach(t=>{
        const item = el('div','item');
        item.innerHTML = `
          <div class="item-head">
            <div>
              <b>${escapeHtml(t.name)}</b>
              <div class="fine">${formatDate(t.start_date)} até ${formatDate(t.end_date)}</div>
              <div class="pill" style="margin-top:8px">${escapeHtml(t.code)}</div>
            </div>
            <button class="btn small">Entrar</button>
          </div>`;
        item.querySelector('button').onclick = ()=> loadTripByCode(t.code);
        wrap.appendChild(item);
      });
    }

    async function loadTripByCode(code){
      if(!state.supabase) return showToast('Preencha URL e anon key no topo do HTML antes de usar.');
      const {data,error} = await state.supabase.from('trips').select('*').eq('code', code.trim().toUpperCase()).maybeSingle();
      if(error || !data) return showToast('Viagem não encontrada.');
      state.currentTrip = data;
      localStorage.setItem('vg_current_trip_id', data.id);
      pushRecentTrip(data);
      await refreshAll();
      switchScreen('app');
    }

    async function createTrip(){
      if(!state.supabase) return showToast('Preencha URL e anon key no topo do HTML antes de usar.');
      const payload = {
        code: codeGen(),
        name: $('#createTripName').value.trim(),
        start_date: $('#createTripStart').value,
        end_date: $('#createTripEnd').value,
        orcamento_previsto: $('#createTripBudget').value || null
      };
      if(!payload.name || !payload.start_date || !payload.end_date) return showToast('Preencha nome e datas.');
      const {data,error} = await state.supabase.from('trips').insert(payload).select().single();
      if(error) return showToast(error.message);
      $('#createTripName').value = '';
      $('#createTripStart').value = '';
      $('#createTripEnd').value = '';
      $('#createTripBudget').value = '';
      state.currentTrip = data;
      pushRecentTrip(data);
      await refreshAll();
      switchScreen('app');
    }

    let _navInited = false;
    function switchScreen(screen){
      $('#screenHome').classList.toggle('hidden', screen !== 'home');
      $('#screenApp').classList.toggle('hidden', screen !== 'app');
      $('#btnSOS').classList.add('hidden');
      // topbarCompact is inside #screenApp — hidden/shown with it automatically
      const bnav = document.getElementById('bottomNav');
      const fab  = document.getElementById('fabAdd');
      if(bnav) bnav.classList.toggle('hidden', screen !== 'app');
      if(fab)  fab.classList.toggle('hidden', screen !== 'app');
      if(screen === 'app'){
        if(!_navInited){ initBottomNav(); }
        renderApp();
        maybeOpenWizard();
      }
    }

    async function refreshAll(){
      if(!state.currentTrip || !state.supabase) return;
      const tripId = state.currentTrip.id;
      const [
        families, members, transfers, transportProviders, hotels, hotelGuests, flights, flightPassengers, flightTickets, parks, parkTickets,
        attractions, attractionTickets, alarms, expenses, expenseSplits, messages, gallery, documents, roteiro, checkins, familyExpensesRes
      ] = await Promise.all([
        state.supabase.from('families').select('*').eq('trip_id',tripId).order('created_at'),
        state.supabase.from('members').select('*').eq('trip_id',tripId).order('name'),
        state.supabase.from('transfers').select('*').eq('trip_id',tripId).order('data_hora'),
        state.supabase.from('transport_providers').select('*').eq('trip_id',tripId).order('empresa'),
        state.supabase.from('hotels').select('*').eq('trip_id',tripId).order('checkin'),
        state.supabase.from('hotel_guests').select('*'),
        state.supabase.from('flights').select('*').eq('trip_id',tripId).order('data'),
        state.supabase.from('flight_passengers').select('*'),
        state.supabase.from('flight_tickets').select('*').order('created_at'),
        state.supabase.from('parks').select('*').eq('trip_id',tripId).order('data'),
        state.supabase.from('park_tickets').select('*'),
        state.supabase.from('attractions').select('*').eq('trip_id',tripId).order('data_hora'),
        state.supabase.from('attraction_tickets').select('*'),
        state.supabase.from('alarms').select('*').eq('trip_id',tripId).order('data_hora'),
        state.supabase.from('expenses').select('*').eq('trip_id',tripId).order('data',{ascending:false}),
        state.supabase.from('expense_splits').select('*'),
        state.supabase.from('messages').select('*').eq('trip_id',tripId).order('created_at'),
        state.supabase.from('gallery').select('*').eq('trip_id',tripId).order('created_at',{ascending:false}),
        state.supabase.from('documents').select('*'),
        state.supabase.from('roteiro').select('*').eq('trip_id',tripId).maybeSingle(),
        state.supabase.from('checkins_localizacao').select('*').eq('trip_id',tripId).order('created_at',{ascending:false}),
        state.supabase.from('family_expenses').select('*').eq('trip_id',tripId).order('data',{ascending:true}),
      ]);

      state.cache.families = families.data || [];
      state.cache.members = members.data || [];
      state.cache.transfers = transfers.data || [];
      state.cache.transportProviders = transportProviders.data || [];
      state.cache.hotels = hotels.data || [];
      state.cache.hotelGuests = hotelGuests.data || [];
      state.cache.flights = flights.data || [];
      state.cache.flightPassengers = flightPassengers.data || [];
      state.cache.flightTickets = flightTickets.data || [];
      state.cache.parks = parks.data || [];
      state.cache.parkTickets = parkTickets.data || [];
      state.cache.attractions = attractions.data || [];
      state.cache.attractionTickets = attractionTickets.data || [];
      state.cache.alarms = alarms.data || [];
      state.cache.expenses = expenses.data || [];
      state.cache.expenseSplits = expenseSplits.data || [];
      state.cache.messages = messages.data || [];
      state.cache.gallery = gallery.data || [];
      state.cache.documents = (documents.data || []).filter(d => {
        const famIds = state.cache.families.map(f=>f.id);
        const memberIds = state.cache.members.map(m=>m.id);
        return famIds.includes(d.family_id) || memberIds.includes(d.member_id) || String(d.atracao_nome||'').startsWith('hotel:');
      });
      state.cache.roteiro = roteiro.data || null;
      state.cache.checkins = checkins.data || [];
      state.cache.familyExpenses = familyExpensesRes.data || [];

      $('#kpiFamilies').textContent = state.cache.families.length;
      $('#kpiMembers').textContent = state.cache.members.length;
      $('#kpiTransfers').textContent = state.cache.transfers.length;
      $('#kpiExpenses').textContent = formatMoney(state.cache.expenses.reduce((s,x)=>s+Number(x.valor||0),0));

      if(state.currentFamily){
        const match = state.cache.families.find(f=>f.id === state.currentFamily.id);
        if(!match){ state.currentFamily = null; state.currentMember = null; state.familyPinVerified=false; state.familyPin=''; }
        else {
          state.currentFamily = match;
          const restored = restoreCurrentMember();
          if(restored) state.currentMember = restored;
          else if(state.currentMember && state.currentMember.family_id === state.currentFamily.id){
            const currentMatch = state.cache.members.find(m=>m.id===state.currentMember.id);
            state.currentMember = currentMatch || null;
          } else {
            state.currentMember = null;
          }
        }
      } else {
        state.currentMember = null;
      }

    function renderApp(){
      if(!state.currentTrip) return;

      // Update trip code bar
      const codeEl = document.getElementById('tripCode');

      const profileLabel = document.getElementById('topbarProfileLabel');
      if(profileLabel){
        if(state.currentFamily && state.currentMember)
          profileLabel.textContent = `${state.currentMember.name}`;
        else if(state.currentFamily)
          profileLabel.textContent = `${state.currentFamily.name}`;
        else
          profileLabel.textContent = 'Identificar-se';
      }

      // Legacy elements (hidden, kept for compat)
      const titleEl = document.getElementById('tripTitle');
      if(titleEl) titleEl.textContent = state.currentTrip.name;

      updateBottomNav();
      renderCurrentTab();
      updateFab();

    function membersByFamily(familyId){ return state.cache.members.filter(m=>m.family_id===familyId); }
    function familyOfMember(memberId){
      const m = state.cache.members.find(x=>x.id===memberId); if(!m) return null;
      return state.cache.families.find(f=>f.id===m.family_id) || null;
    }
    function ticketForFlight(flightId, memberId){ return state.cache.flightTickets.find(t=>t.flight_id===flightId && t.member_id===memberId); }
    function ticketForPark(parkId, memberId){ return state.cache.parkTickets.find(t=>t.park_id===parkId && t.member_id===memberId); }
    function ticketForAttraction(attractionId, memberId){ return state.cache.attractionTickets.find(t=>t.attraction_id===attractionId && t.member_id===memberId); }
    function hotelGuestMembers(hotelId){
      const ids = state.cache.hotelGuests.filter(h=>h.hotel_id===hotelId).map(h=>h.member_id);
      return state.cache.members.filter(m=>ids.includes(m.id));
    }
    function hotelFamilies(hotelId){
      const ids = [...new Set(hotelGuestMembers(hotelId).map(m=>m.family_id))];
      return state.cache.families.filter(f=>ids.includes(f.id));
    }
    function docsByRef(tipo, ref, familyId){
      return state.cache.documents.filter(d=>d.tipo===tipo && d.atracao_nome===ref && (!familyId || d.family_id===familyId));
    }
    function docByRef(tipo, ref, familyId){
      return docsByRef(tipo, ref, familyId)[0] || null;
    }
    function hotelRef(hotelId){ return `hotel:${hotelId}`; }
    function waHref(phone=''){
      const digits = String(phone||'').replace(/\D/g,'');
      if(!digits) return '';
      const withCountry = digits.startsWith('55') ? digits : `55${digits}`;
      return `https://wa.me/${withCountry}`;
    }
    function renderWhatsApp(phone, label='WhatsApp'){
      return phone ? `<a class="btn secondary small" href="${waHref(phone)}" target="_blank">${label}</a>` : '';
    }
    function renderMaps(address, label){
      if(!address) return '';
      const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`;
      return `<a class="btn secondary small" href="${url}" target="_blank" rel="noopener noreferrer">📍 ${label || 'Ver no Maps'}</a>`;
    }
    function renderOpenOriginal(url, label='Abrir original'){
      return url ? `<a class="btn small" href="${url}" target="_blank" rel="noopener noreferrer">${label}</a>` : '';
    }
    function isImageUrl(url=''){
      const clean = String(url||'').split('?')[0].toLowerCase();
      return /\.(png|jpe?g|gif|webp|bmp|svg|heic|heif)$/i.test(clean);
    }
    function renderDocViewer(url, emptyText){
      if(!url) return `<div class="fine">${emptyText}</div>`;
      const media = isImageUrl(url)
        ? `<img src="${url}" alt="Arquivo enviado" style="max-width:100%;max-height:420px;border-radius:18px;display:block;margin:auto;object-fit:contain;background:#f8fafc">`
        : `<iframe class="viewer-iframe" src="${url}"></iframe>`;
      return `<div class="inline-actions" style="margin:8px 0 10px">${renderOpenOriginal(url,'Abrir original')}</div><div class="media-box">${media}</div>`;
    }
    function entityMeta(){
      try{return JSON.parse(localStorage.getItem('vg_entity_meta')||'{}')}catch(e){return {}}
    }
    function getEntityMeta(type,id){
      const m=entityMeta(); return (m[type]||{})[id]||{};
    }
    function setEntityMeta(type,id,value){
      const m=entityMeta(); m[type]=m[type]||{}; m[type][id]={...(m[type][id]||{}),...value};
      localStorage.setItem('vg_entity_meta', JSON.stringify(m));
    }
    function checkedValues(name){
      return [...document.querySelectorAll(`input[name="${name}"]:checked`)].map(i=>i.value);
    }
    function flightPassengers(flightId){
      const ids = new Set([
        ...state.cache.flightPassengers.filter(fp=>fp.flight_id===flightId).map(fp=>fp.member_id),
        ...state.cache.flightTickets.filter(t=>t.flight_id===flightId).map(t=>t.member_id)
      ]);
      return state.cache.members.filter(m=>ids.has(m.id));
    }
    function getChatSeenKey(){ return state.currentTrip ? `vg_chat_seen_${state.currentTrip.id}` : 'vg_chat_seen'; }
    function getChatUnreadCount(){
      if(!state.currentTrip) return 0;
      const lastSeen = localStorage.getItem(getChatSeenKey()) || '';
      return state.cache.messages.filter(m=> (m.created_at||'') > lastSeen).length;
    }
    function markChatAsRead(){
      if(!state.currentTrip || !state.cache.messages.length) return;
      const latest = state.cache.messages[state.cache.messages.length-1]?.created_at;
      if(latest) localStorage.setItem(getChatSeenKey(), latest);
    }
    function getRateioConfig(){
      if(!state.currentTrip) return {participants:[]};
      try{ return JSON.parse(localStorage.getItem(`vg_rateio_cfg_${state.currentTrip.id}`)||'{"participants":[]}'); }catch(e){ return {participants:[]}; }
    }
    function setRateioConfig(cfg){
      if(!state.currentTrip) return;
      localStorage.setItem(`vg_rateio_cfg_${state.currentTrip.id}`, JSON.stringify(cfg||{participants:[]}));
    }
    function calculateRateioSettlement(participantIds){
      const selected = [...new Set((participantIds||[]).filter(Boolean))];
      const total = Number(state.cache.expenses.reduce((sum,e)=> sum + Number(e.valor||0), 0).toFixed(2));
      const count = selected.length;
      const perPerson = count ? Number((total / count).toFixed(2)) : 0;

      const balances = state.cache.members
        .filter(m=> selected.includes(m.id))
        .map(m=>{
          const paid = Number(state.cache.expenses
            .filter(e=>e.pago_por===m.id)
            .reduce((sum,e)=> sum + Number(e.valor||0), 0)
            .toFixed(2));
          const share = perPerson;
          const balance = Number((paid - share).toFixed(2));
          return {id:m.id, name:m.name, pix:m.pix_key||'', paid, share, balance};
        });

      const creditors = balances
        .filter(b=>b.balance > 0.009)
        .sort((a,b)=>b.balance-a.balance)
        .map(b=>({...b, amount:Number(b.balance.toFixed(2))}));

      const debtors = balances
        .filter(b=>b.balance < -0.009)
        .sort((a,b)=>Math.abs(b.balance)-Math.abs(a.balance))
        .map(b=>({...b, amount:Number(Math.abs(b.balance).toFixed(2))}));

      const settlements = [];
      let i = 0;
      let j = 0;

      while(i < debtors.length && j < creditors.length){
        const amt = Math.min(debtors[i].amount, creditors[j].amount);
        if(amt > 0.009){
          settlements.push({
            from: debtors[i],
            to: creditors[j],
            amount: Number(amt.toFixed(2))
          });
          debtors[i].amount = Number((debtors[i].amount - amt).toFixed(2));
          creditors[j].amount = Number((creditors[j].amount - amt).toFixed(2));
        }
        if(debtors[i].amount <= 0.009) i += 1;
        if(creditors[j].amount <= 0.009) j += 1;
      }

      return {total, count, perPerson, balances, settlements};
    }

    function dateKeyFromValue(v){
      if(!v) return '';
      if(/^\d{4}-\d{2}-\d{2}$/.test(String(v))) return String(v).slice(0,10);
      const d = new Date(v);
      if(Number.isNaN(d.getTime())) return String(v).slice(0,10);
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${day}`;
    }
    function formatDayLong(dayKey){
      if(!dayKey) return '-';
      const [y,m,d] = dayKey.split('-');
      const dt = new Date(Number(y), Number(m)-1, Number(d));
      return dt.toLocaleDateString('pt-BR',{weekday:'long', day:'2-digit', month:'2-digit', year:'numeric'});
    }
    function getAlarmToggleStore(){
      if(!state.currentTrip) return {};
      try{return JSON.parse(localStorage.getItem(`vg_alarm_switches_${state.currentTrip.id}`)||'{}')}catch(e){return {}}
    }
    function isAlarmToggleOn(key){
      const store = getAlarmToggleStore();
      return store[key] !== false;
    }
    function setAlarmToggle(key, value){
      if(!state.currentTrip) return;
      const store = getAlarmToggleStore();
      store[key] = !!value;
      localStorage.setItem(`vg_alarm_switches_${state.currentTrip.id}`, JSON.stringify(store));
    }
    function getAlarmTimeStore(){
      if(!state.currentTrip) return {};
      try{return JSON.parse(localStorage.getItem(`vg_alarm_times_${state.currentTrip.id}`)||'{}')}catch(e){return {}}
    }
    function getAlarmTimeValue(key, fallback=''){
      if(!key) return fallback || '';

      return store[key] || fallback || '';
    }
    function setAlarmTimeValue(key, value){
      if(!state.currentTrip || !key) return;
      const store = getAlarmTimeStore();
      store[key] = value || '';
      localStorage.setItem(`vg_alarm_times_${state.currentTrip.id}`, JSON.stringify(store));
    }
    function renderRoteiroAlarmControl(ev){

      return `<div class="roteiro-alarm-inline"><span class="roteiro-alarm-icon" aria-hidden="true"></span><span class="roteiro-alarm-label">Alarme</span><input class="roteiro-alarm-input" type="time" value="${escapeHtml(alarmTime)}" data-alarm-time-key="${escapeHtml(ev.alarm_key)}"><span class="roteiro-alarm-time">${escapeHtml(alarmTime)}</span><button class="roteiro-alarm-toggle ${on ? 'on':'off'}" data-alarm-key="${escapeHtml(ev.alarm_key)}">${on ? 'Ligado':'Desligado'}</button></div>`;

    function getTripDays(){
      const out = [];
      const startKey = dateKeyFromValue(state.currentTrip?.start_date);
      const endKey = dateKeyFromValue(state.currentTrip?.end_date || state.currentTrip?.start_date);
      if(startKey && endKey){
        let cur = new Date(startKey+'T00:00:00');
        const end = new Date(endKey+'T00:00:00');
        while(cur <= end){
          out.push(dateKeyFromValue(cur.toISOString()));
          cur.setDate(cur.getDate()+1);
        }
      }
      if(out.length) return out;
      const keys = new Set();
      state.cache.flights.forEach(f=> f.data && keys.add(dateKeyFromValue(f.data)));
      state.cache.transfers.forEach(t=> t.data_hora && keys.add(dateKeyFromValue(t.data_hora)));
      state.cache.hotels.forEach(h=> { if(h.checkin) keys.add(dateKeyFromValue(h.checkin)); if(h.checkout) keys.add(dateKeyFromValue(h.checkout)); });
      state.cache.parks.forEach(p=> p.data && keys.add(dateKeyFromValue(p.data)));
      state.cache.attractions.forEach(a=> a.data_hora && keys.add(dateKeyFromValue(a.data_hora)));
      state.cache.alarms.forEach(a=> a.data_hora && keys.add(dateKeyFromValue(a.data_hora)));
      return [...keys].sort();
    }
    function getRoteiroEventsByDay(dayKey){
      const events = [];
      state.cache.flights.forEach(f=>{
        if(dateKeyFromValue(f.data) !== dayKey) return;
        const pax = flightPassengers(f.id);
        const locator = f.localizador || f.numero_reserva || (state.cache.flightTickets.find(t=>t.flight_id===f.id && t.localizador)?.localizador) || 'a definir';
        events.push({
          tipo:'voo',
          source_id:f.id,
          sort:`${dayKey}T${(f.horario || '09:00').padStart(5,'0')}`,
          title:`${f.origem || '-'} → ${f.destino || '-'}`,
          time:f.horario || '',
          alarm_time:f.horario || '',
          alarm_key:`voo:${f.id}`,
          lines:[
            `${f.cia || 'Companhia não informada'} ${f.numero_voo || ''}`.trim(),
            `Localizador: ${locator}`,
            `${pax.length} passageiro(s)`
          ],
          actions:`<button class="btn secondary small" data-roteiro-action="flight-docs" data-id="${f.id}">Passagens + CPF</button>`
        });
      });
      state.cache.transfers.forEach(t=>{
        if(dateKeyFromValue(t.data_hora) !== dayKey) return;
        const hh = (t.data_hora || '').split('T')[1]?.slice(0,5) || '';
        events.push({
          tipo:'transporte',
          source_id:t.id,
          sort:t.data_hora || `${dayKey}T12:00`,
          title:`${splitNameAddr(t.origem).name || t.origem || '-'} → ${splitNameAddr(t.destino).name || t.destino || '-'}`,
          address_origin: splitNameAddr(t.origem).addr || t.origem || '',
          address_dest: splitNameAddr(t.destino).addr || t.destino || '',
          time:hh,
          alarm_time:hh,
          alarm_key:`transporte:${t.id}`,
          lines:[
            `Responsável: ${t.responsavel || 'não informado'}`,
            t.placa ? `Placa: ${t.placa}` : '',
            t.obs || ''
          ].filter(Boolean),
          actions:`${renderWhatsApp(t.contato || '', 'WhatsApp')} ${renderMaps(t.destino || '')}`
        });
      });
      state.cache.hotels.forEach(h=>{
        if(dateKeyFromValue(h.checkin) === dayKey){
          const meta = getEntityMeta('hotels', h.id);
          const guests = hotelGuestMembers(h.id);
          events.push({
            tipo:'hospedagem',
            source_id:`${h.id}:checkin`,
            sort:`${dayKey}T14:00`,
            title:h.nome || 'Hospedagem',
            time:'Check-in',
            alarm_time:'14:00',
            alarm_key:`hospedagem:${h.id}:checkin`,
            address: h.endereco || '',
            lines:[
              meta.reserva_numero || h.numero_reserva ? `Reserva: ${meta.reserva_numero || h.numero_reserva}` : '',
              `${guests.length} hóspede(s)`
            ].filter(Boolean),
            actions:`${renderWhatsApp(h.whatsapp||h.contato||'','WhatsApp')} ${renderMaps(h.endereco)} <button class="btn secondary small" data-roteiro-action="hotel-voucher" data-id="${h.id}">Voucher</button><button class="btn secondary small" data-roteiro-action="hotel-docs" data-id="${h.id}">Documentos</button>`
          });
        }
        if(dateKeyFromValue(h.checkout) === dayKey){
          events.push({
            tipo:'hospedagem',
            source_id:`${h.id}:checkout`,
            sort:`${dayKey}T11:00`,
            title:`Check-out ${h.nome || ''}`.trim(),
            time:'Check-out',
            alarm_time:'11:00',
            alarm_key:`hospedagem:${h.id}:checkout`,
            address: h.endereco || '',
            lines:[],
            actions:`${renderWhatsApp(h.whatsapp||h.contato||'','WhatsApp')} ${renderMaps(h.endereco)}`
          });
        }
        // Days BETWEEN checkin and checkout — show as "hospedando"
        if(h.checkin && h.checkout){
          const cin  = dateKeyFromValue(h.checkin);
          const cout = dateKeyFromValue(h.checkout);
          if(dayKey > cin && dayKey < cout){
            events.push({
              tipo:'hospedagem',
              source_id:`${h.id}:mid:${dayKey}`,
              sort:`${dayKey}T08:00`,
              title:`🏨 ${h.nome || 'Hospedagem'}`,
              time:'Hospedado',
              alarm_key:null,
              address: h.endereco || '',
              lines:[],
              actions:`${renderWhatsApp(h.whatsapp||h.contato||'','WhatsApp')} ${renderMaps(h.endereco)}`
            });
          }
        }
      });
      state.cache.parks.forEach(p=>{
        if(dateKeyFromValue(p.data) !== dayKey) return;
        const participants = state.cache.parkTickets.filter(t=>t.park_id===p.id).length;
        events.push({
          tipo:'parque',
          source_id:p.id,
          sort:`${dayKey}T09:00`,
          title:p.nome || 'Parque',
          address: p.endereco || '',
          time:'Dia do parque',
          alarm_time:'09:00',
          alarm_key:`parque:${p.id}`,
          lines:[`${participants} participante(s)`],
          actions:`<button class="btn secondary small" data-roteiro-action="park-docs" data-id="${p.id}">Ingressos + documentos</button>`
        });
      });
      state.cache.attractions.forEach(a=>{
        if(dateKeyFromValue(a.data_hora) !== dayKey) return;
        const participants = state.cache.attractionTickets.filter(t=>t.attraction_id===a.id).length;
        const hh = (a.data_hora || '').split('T')[1]?.slice(0,5) || '';
        events.push({
          tipo:'atração',
          source_id:a.id,
          sort:a.data_hora || `${dayKey}T12:00`,
          title:a.nome || 'Atração',
          address: a.endereco || '',
          time:hh,
          alarm_time:hh,
          alarm_key:`atracao:${a.id}`,
          lines:[`${participants} participante(s)`],
          actions:`<button class="btn secondary small" data-roteiro-action="attraction-docs" data-id="${a.id}">Ingressos + documentos</button>`
        });
      });
      return events.sort((a,b)=> new Date(a.sort) - new Date(b.sort));
    }

    async function openHotelVoucher(hotel, guests){
      if(!state.currentFamily || !state.familyPinVerified) return openFamilyAccess('Para ver voucher e documentos do hotel, ative sua família e confirme o PIN.');
      const guestFamilies = [...new Set(guests.map(g=>g.family_id))];
      if(guestFamilies.length && !guestFamilies.includes(state.currentFamily.id)) return showToast('Este voucher pertence a outra família.');
      const ref = hotelRef(hotel.id);
      const voucherDoc = docByRef('hotel_voucher', ref, state.currentFamily.id);
      const meta = getEntityMeta('hotels', hotel.id);
      openModal(buildDocumentModalLayout({
        title: escapeHtml(hotel.nome),
        subtitle: `${formatDate(hotel.checkin)} até ${formatDate(hotel.checkout)} ${meta.reserva_numero ? '• Reserva '+escapeHtml(meta.reserva_numero):''}`,
        previewTitle: 'Voucher da hospedagem',
        previewUrl: voucherDoc?.arquivo_url || '',
        previewEmpty: 'Nenhum voucher enviado ainda para sua família.',
        uploadLabel: 'Atualizar comprovante da hospedagem',
        uploadInputId: 'uploadHotelVoucher',
        primaryButtonId: 'btnSaveHotelVoucher',
        primaryButtonText: 'Salvar comprovante',
        extraActions: `${renderWhatsApp(hotel.contato,'WhatsApp')} ${renderMaps(hotel.endereco)} ${renderOpenOriginal(voucherDoc?.arquivo_url)}`
      }));
      $('#btnCloseDocModal').onclick = closeModal;
      $('#btnSaveHotelVoucher').onclick = async ()=>{
        const file = $('#uploadHotelVoucher').files[0];
        if(!file) return showToast('Selecione um arquivo.');
        const url = await uploadFile('documentos', file, `${state.currentTrip.id}/hotels/${hotel.id}/${state.currentFamily.id}_${Date.now()}_${file.name}`);
        if(!url) return;
        const existing = docByRef('hotel_voucher', ref, state.currentFamily.id);
        let res;
        if(existing) res = await state.supabase.from('documents').update({arquivo_url:url}).eq('id', existing.id);
        else res = await state.supabase.from('documents').insert({member_id:null, family_id:state.currentFamily.id, tipo:'hotel_voucher', arquivo_url:url, atracao_nome:ref});
        if(res.error) return showToast(res.error.message);
        await refreshAll(); renderApp(); closeModal(); showToast('Comprovante salvo.');
      };
    }

    function getDerivedAlarms(){
      const out = [];
      state.cache.transfers.forEach(t=>{
        if(t.data_hora) out.push({tipo:'transporte', titulo:`Transporte: ${t.origem} → ${t.destino}`, descricao:t.obs || t.responsavel || '', data_hora:t.data_hora, source_id:t.id});
      });
      state.cache.hotels.forEach(h=>{
        if(h.checkin) out.push({tipo:'hospedagem', titulo:`Check-in: ${h.nome}`, descricao:h.endereco || '', data_hora:`${h.checkin}T14:00`, source_id:h.id});
        if(h.checkout) out.push({tipo:'hospedagem', titulo:`Check-out: ${h.nome}`, descricao:h.endereco || '', data_hora:`${h.checkout}T11:00`, source_id:h.id+'-out'});
      });
      state.cache.flights.forEach(f=>{
        if(f.data){
          const hh = (f.horario && /^\d{1,2}:\d{2}$/.test(f.horario)) ? f.horario : '08:00';
          out.push({tipo:'voo', titulo:`Voo: ${f.origem||''} → ${f.destino||''}`, descricao:`${f.cia||''} ${f.numero_voo||''}`.trim(), data_hora:`${f.data}T${hh}`, source_id:f.id});
        }
      });
      state.cache.parks.forEach(p=>{
        if(p.data) out.push({tipo:'parque', titulo:`Parque: ${p.nome}`, descricao:'Ingresso e documento', data_hora:`${p.data}T09:00`, source_id:p.id});
      });
      state.cache.attractions.forEach(a=>{
        if(a.data_hora) out.push({tipo:'atração', titulo:`Atração: ${a.nome}`, descricao:'Ingresso da atração', data_hora:a.data_hora, source_id:a.id});
      });
      return out.sort((a,b)=> new Date(a.data_hora) - new Date(b.data_hora));
    }

    function downloadICS(a){
      const start = new Date(a.data_hora);
      const end = new Date(start.getTime() + 60*60*1000);
      const toICS = d => d.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
      const text = `BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
DTSTAMP:${toICS(new Date())}
DTSTART:${toICS(start)}
DTEND:${toICS(end)}
SUMMARY:${a.titulo}
DESCRIPTION:${a.descricao || ''}
END:VEVENT
END:VCALENDAR`;
      const blob = new Blob([text], {type:'text/calendar'});
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url; link.download = 'alarme.ics'; link.click();
      URL.revokeObjectURL(url);
    }

    // Returns sorted day keys from the roteiro (same logic as renderRoteiro)
    function getRoteirodays(){
      const keys = new Set();
      const startKey = dateKeyFromValue(state.currentTrip?.start_date);
      const endKey   = dateKeyFromValue(state.currentTrip?.end_date || state.currentTrip?.start_date);
      if(startKey && endKey){
        let cur = new Date(startKey + 'T12:00:00');
        const end = new Date(endKey + 'T12:00:00');
        while(cur <= end){ keys.add(dateKeyFromValue(cur.toISOString())); cur.setDate(cur.getDate()+1); }
      }
      state.cache.flights.forEach(f=> f.data && keys.add(dateKeyFromValue(f.data)));
      state.cache.transfers.forEach(t=> t.data_hora && keys.add(dateKeyFromValue(t.data_hora)));
      state.cache.hotels.forEach(h=>{ if(h.checkin) keys.add(dateKeyFromValue(h.checkin)); if(h.checkout) keys.add(dateKeyFromValue(h.checkout)); });
      state.cache.parks.forEach(p=> p.data && keys.add(dateKeyFromValue(p.data)));
      state.cache.attractions.forEach(a=> a.data_hora && keys.add(dateKeyFromValue(a.data_hora)));
      state.cache.expenses.forEach(e=> e.data && keys.add(dateKeyFromValue(e.data)));
      return [...keys].filter(Boolean).sort();
    }

    async function deleteStorageUrl(url){
      if(!url) return;
      try{
        const m = String(url).match(/\/storage\/v1\/object\/public\/([^\/]+)\/(.+)$/);
        if(!m) return;
        const bucket = decodeURIComponent(m[1]);
        const path = decodeURIComponent(m[2]);
        await state.supabase.storage.from(bucket).remove([path]);
      }catch(e){}
    }

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIAGNÓSTICO - Viagem da Isa</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{font-family:monospace;background:#000;color:#0f0;padding:20px;font-size:14px}
    .erro{background:#300;color:#f00;padding:10px;margin:10px 0}
    .ok{background:#030;color:#0f0;padding:10px;margin:10px 0}
    .info{background:#003;color:#0af;padding:10px;margin:10px 0}
    button{background:#333;color:#fff;border:1px solid #666;padding:10px;cursor:pointer;margin:5px}
    pre{white-space:pre-wrap;word-wrap:break-word}
  </style>
</head>
<body>
  <h1>DIAGNÓSTICO DO SUPABASE</h1>
  <div id="log"></div>
  <button onclick="testarTudo()">RODAR TESTE COMPLETO</button>

  <script>
    const SUPABASE_URL = 'https://cfvipeilwbeppqxvqpid.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_gt9MVCBDhyHkLxmrMZnDjw_lKnogqS4';
    // MUDEI O NOME PRA 'sb' PRA NÃO DAR CONFLITO
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    function log(msg, tipo = 'info') {
      const div = document.createElement('div');
      div.className = tipo;
      div.innerHTML = '<pre>' + msg + '</pre>';
      document.getElementById('log').appendChild(div);
    }

    async function testarTudo() {
      document.getElementById('log').innerHTML = '';
      log('1. URL: ' + SUPABASE_URL);
      log('2. KEY: ' + SUPABASE_KEY.substring(0,20) + '...');
      
      log('\n3. TESTANDO LOGIN ANÔNIMO...');
      const { data: authData, error: authError } = await sb.auth.signInAnonymously();
      if (authError) {
        log('ERRO NO LOGIN ANÔNIMO: ' + JSON.stringify(authError, null, 2), 'erro');
        log('SOLUÇÃO: Supabase > Authentication > Providers > Ativa "Anonymous"', 'erro');
        return;
      }
      log('LOGIN ANÔNIMO OK. User ID: ' + authData.user.id, 'ok');

      log('\n4. TESTANDO LEITURA DA TABELA trips...');
      const { data: readData, error: readError } = await sb.from('trips').select('*').limit(1);
      if (readError) {
        log('ERRO AO LER trips: ' + JSON.stringify(readError, null, 2), 'erro');
        log('SOLUÇÃO: Roda o SQL de novo. Tabela não existe ou RLS bloqueando.', 'erro');
        return;
      }
      log('LEITURA OK. Encontrados: ' + readData.length + ' registros', 'ok');

      log('\n5. TESTANDO CRIAR VIAGEM...');
      const codigo = 'TEST' + Math.random().toString(36).substring(2, 6).toUpperCase();
      const { data: insertData, error: insertError } = await sb.from('trips').insert({
        name: 'Viagem Teste Diagnóstico',
        code: codigo,
        start_date: '2026-04-19',
        end_date: '2026-04-25'
      }).select().single();

      if (insertError) {
        log('ERRO AO CRIAR VIAGEM: ' + JSON.stringify(insertError, null, 2), 'erro');
        if (insertError.code === '42501') {
          log('ERRO 42501 = PERMISSION DENIED. O RLS tá bloqueando INSERT.', 'erro');
          log('SOLUÇÃO: Roda o SQL com "create policy anon_all... using (true) with check (true)"', 'erro');
        }
        return;
      }
      log('CRIAÇÃO OK! Código gerado: ' + insertData.code, 'ok');
      log('\nSE CHEGOU ATÉ AQUI, O BANCO TÁ 100%. O problema é no HTML do app.', 'ok');
    }

    // Roda sozinho quando abre
    testarTudo();
  </script>
</body>
</html>
